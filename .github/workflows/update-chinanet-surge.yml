name: Update ChinaNet Surge Ruleset

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Generate Surge ruleset
        shell: bash
        run: |
          set -euo pipefail

          SRC="https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/chinanet.txt"
          OUT="ruleset/chinanet_surge.list"
          TMP="$(mktemp)"

          mkdir -p "$(dirname "$OUT")"

          curl -fsSL "$SRC" -o "$TMP"

          {
            echo "# ChinaNet IPv4 for Surge"
            echo "# Source: gaoyifan/china-operator-ip / chinanet.txt"
            echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo

            grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+$' "$TMP" \
              | sort -V \
              | awk '{print "IP-CIDR," $0}'
          } > "$OUT"

          COUNT="$(grep -c '^IP-CIDR,' "$OUT" || true)"
          echo "Generated $COUNT IP-CIDR rules"

          if [ "$COUNT" -lt 1000 ]; then
            echo "Too few rules, abort."
            exit 1
          fi

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git add ruleset/chinanet_surge.list
          git commit -m "Update ChinaNet Surge ruleset"
          git push
