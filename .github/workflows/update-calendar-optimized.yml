              "春分": ["春分", "Vernal Equinox"],
              "清明": ["清明", "Bright and Clear"],
              "谷雨": ["谷雨", "穀雨", "Corn Rain"],
              "立夏": ["立夏", "Summer Commences"],
              "小满": ["小满", "小滿", "Corn Forms"],
              "芒种": ["芒种", "芒種", "Corn on Ear"],
              "夏至": ["夏至", "Summer Solstice"],
              "小暑": ["小暑", "Moderate Heat"],
              "大暑": ["大暑", "Great Heat"],
