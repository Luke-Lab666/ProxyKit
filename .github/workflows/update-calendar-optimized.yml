name: Update Calendar

on:
  schedule:
    # 每年 12 月 17 日 00:17 北京时间运行，生成明年日历
    - cron: "17 16 16 12 *"
  workflow_dispatch:
    inputs:
      year:
        description: "要生成的年份，留空则自动判断"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      INPUT_YEAR: ${{ github.event.inputs.year || '' }}

    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install calendar dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install lunardate chinese-calendar pymupdf ephem beautifulsoup4

      - name: Generate calendar files
        run: |
          set -euo pipefail
          mkdir -p Calendar

          python3 <<'PY'
