name: Update Merged China Calendar

on:
  schedule:
    - cron: "0 0 17 12 *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-merged-china-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags --depth=1 origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge calendar sources
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import hashlib
          import re
          import sys
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta, date
          from pathlib import Path

          OUTPUT_FILE = Path("Calendar/china-holidays.ics")

          SOURCES = [
              {
                  "name": "Apple 中国大陆节假日",
                  "url": "https://calendars.icloud.com/holidays/cn_zh.ics",
                  "priority": 1,
                  "required": True,
              },
              {
                  "name": "中国节假日调休 Pro",
                  "url": "https://kyzsalist.cn/appleics/download.php?type=external&file=jie_jia_ri_pro.ics",
                  "priority": 2,
                  "required": False,
              },
          ]

          CAL_NAME = "中国大陆节假日与调休"
          PROD_ID = "-//Luke-Lab666//ProxyKit China Calendar//CN"
          UID_DOMAIN = "proxykit.obliviatedig.top"

          def log(message: str) -> None:
              print(message, flush=True)

          def warn(message: str) -> None:
              print(f"::warning::{message}", flush=True)

          def fail(message: str) -> None:
              print(f"::error::{message}", flush=True)
              sys.exit(1)

          def fetch_text(source: dict) -> str | None:
              name = source["name"]
              url = source["url"]
              required = source["required"]

              headers = {
                  "User-Agent": "Mozilla/5.0 (GitHub Actions; ProxyKit Calendar Updater)",
                  "Accept": "text/calendar,text/plain,*/*",
                  "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.8",
                  "Cache-Control": "no-cache",
              }

              req = urllib.request.Request(url, headers=headers)

              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      status = getattr(resp, "status", None)
                      content_type = resp.headers.get("Content-Type", "")
                      data = resp.read()

                  log(f"{name}: HTTP {status}, Content-Type={content_type}, Bytes={len(data)}")

                  text = None
                  for encoding in ("utf-8-sig", "utf-8", "gb18030", "big5"):
                      try:
                          text = data.decode(encoding)
                          break
                      except UnicodeDecodeError:
                          continue

                  if text is None:
                      text = data.decode("utf-8", errors="replace")

                  if "BEGIN:VCALENDAR" not in text or "BEGIN:VEVENT" not in text:
                      preview = text[:300].replace("\n", "\\n").replace("\r", "\\r")
                      message = f"{name} 返回的不是有效 ICS。Preview: {preview}"

                      if required:
                          fail(message)

                      warn(message)
                      return None

                  return text

              except Exception as exc:
                  message = f"{name} 下载失败：{type(exc).__name__}: {exc}"

                  if required:
                      fail(message)

                  warn(message)
                  return None

          def normalize_newlines(text: str) -> str:
              return text.replace("\r\n", "\n").replace("\r", "\n")

          def unfold_ical(text: str) -> list[str]:
              lines = normalize_newlines(text).split("\n")
              unfolded: list[str] = []

              for line in lines:
                  if not line:
                      continue

                  if (line.startswith(" ") or line.startswith("\t")) and unfolded:
                      unfolded[-1] += line[1:]
                  else:
                      unfolded.append(line)

              return unfolded

          def fold_line(line: str, limit: int = 75) -> str:
              if len(line.encode("utf-8")) <= limit:
                  return line

              parts: list[str] = []
              current = ""
              current_len = 0

              for ch in line:
                  ch_len = len(ch.encode("utf-8"))

                  if current_len + ch_len > limit:
                      parts.append(current)
                      current = " " + ch
                      current_len = 1 + ch_len
                  else:
                      current += ch
                      current_len += ch_len

              if current:
                  parts.append(current)

              return "\r\n".join(parts)

          def write_ical(lines: list[str]) -> str:
              return "\r\n".join(fold_line(line) for line in lines) + "\r\n"

          def extract_components(lines: list[str], component: str) -> list[list[str]]:
              begin = f"BEGIN:{component}".upper()
              end = f"END:{component}".upper()

              result: list[list[str]] = []
              collecting = False
              depth = 0
              buf: list[str] = []

              for line in lines:
                  upper = line.upper()

                  if not collecting and upper == begin:
                      collecting = True
                      depth = 1
                      buf = [line]
                      continue

                  if collecting:
                      if upper.startswith("BEGIN:"):
                          depth += 1
                      elif upper.startswith("END:"):
                          depth -= 1

                      buf.append(line)

                      if upper == end and depth == 0:
                          result.append(buf)
                          collecting = False
                          buf = []

              return result

          def prop_line(event: list[str], name: str) -> str:
              prefix = name.upper()

              for line in event:
                  upper = line.upper()
                  if upper.startswith(prefix + ":") or upper.startswith(prefix + ";"):
                      return line

              return ""

          def prop_value(line: str) -> str:
              return line.split(":", 1)[1].strip() if ":" in line else ""

          def unescape_ical_text(value: str) -> str:
              return (
                  value.replace("\\n", " ")
                  .replace("\\N", " ")
                  .replace("\\,", ",")
                  .replace("\\;", ";")
                  .replace("\\\\", "\\")
                  .strip()
              )

          def normalized_summary(summary: str) -> str:
              text = unescape_ical_text(summary).lower()
              text = re.sub(r"[\s\-_/（）()【】\[\]·•,，。:：]+", "", text)

              for token in ("假期", "放假", "休假"):
                  text = text.replace(token, "")

              if text.endswith("节") and len(text) > 2:
                  text = text[:-1]

              return text

          def parse_prop_date(line: str) -> date | None:
              value = prop_value(line)
              match = re.match(r"^(\d{8})", value)

              if not match:
                  return None

              try:
                  return datetime.strptime(match.group(1), "%Y%m%d").date()
              except ValueError:
                  return None

          def event_date_range(event: list[str]) -> tuple[date | None, date | None]:
              start = parse_prop_date(prop_line(event, "DTSTART"))
              end = parse_prop_date(prop_line(event, "DTEND"))

              if start and (not end or end <= start):
                  end = start + timedelta(days=1)

              return start, end

          def overlaps(
              a: tuple[date | None, date | None],
              b: tuple[date | None, date | None],
          ) -> bool:
              a_start, a_end = a
              b_start, b_end = b

              if not a_start or not a_end or not b_start or not b_end:
                  return False

              return a_start < b_end and b_start < a_end

          def event_sort_key(event: list[str]) -> tuple[str, str, str]:
              start = prop_value(prop_line(event, "DTSTART"))
              summary = prop_value(prop_line(event, "SUMMARY"))
              uid = prop_value(prop_line(event, "UID"))
              return (start, summary, uid)

          def canonical_key(event: list[str]) -> tuple[str, str, str, str, str]:
              return (
                  prop_value(prop_line(event, "DTSTART")),
                  prop_value(prop_line(event, "DTEND")),
                  normalized_summary(prop_value(prop_line(event, "SUMMARY"))),
                  prop_value(prop_line(event, "RRULE")),
                  prop_value(prop_line(event, "RDATE")),
              )

          def stamp_event(event: list[str], source_name: str) -> list[str]:
              clean = [
                  line for line in event
                  if not (
                      line.upper().startswith("UID:")
                      or line.upper().startswith("UID;")
                      or line.upper().startswith("DTSTAMP:")
                      or line.upper().startswith("DTSTAMP;")
                      or line.upper().startswith("X-SOURCE-CALENDAR:")
                      or line.upper().startswith("X-SOURCE-CALENDAR;")
                  )
              ]

              key_text = "|".join(canonical_key(event)) or "\n".join(event)
              uid_hash = hashlib.sha256(key_text.encode("utf-8")).hexdigest()[:24]
              dtstamp = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")

              stamped: list[str] = []
              inserted = False

              for line in clean:
                  stamped.append(line)

                  if line.upper() == "BEGIN:VEVENT" and not inserted:
                      stamped.append(f"UID:{uid_hash}@{UID_DOMAIN}")
                      stamped.append(f"DTSTAMP:{dtstamp}")
                      stamped.append(f"X-SOURCE-CALENDAR:{source_name}")
                      inserted = True

              return stamped

          def should_skip_event(
              event: list[str],
              accepted_meta: list[dict],
              exact_keys: set[tuple[str, str, str, str, str]],
          ) -> bool:
              if prop_value(prop_line(event, "STATUS")).upper() == "CANCELLED":
                  return True

              key = canonical_key(event)

              if key in exact_keys:
                  return True

              summary = key[2]
              date_range = event_date_range(event)

              if summary:
                  for item in accepted_meta:
                      if item["summary"] == summary and overlaps(date_range, item["range"]):
                          return True

              return False

          all_events: list[list[str]] = []
          accepted_meta: list[dict] = []
          exact_keys: set[tuple[str, str, str, str, str]] = set()
          timezone_components: list[list[str]] = []
          timezone_seen: set[str] = set()
          used_sources: list[str] = []

          for source in sorted(SOURCES, key=lambda item: item["priority"]):
              log(f"Fetching: {source['name']}")

              text = fetch_text(source)
              if text is None:
                  continue

              used_sources.append(source["name"])
              lines = unfold_ical(text)

              for tz in extract_components(lines, "VTIMEZONE"):
                  tz_key = "\n".join(tz)

                  if tz_key not in timezone_seen:
                      timezone_seen.add(tz_key)
                      timezone_components.append(tz)

              events = extract_components(lines, "VEVENT")
              log(f"{source['name']}: Found {len(events)} events")

              for event in events:
                  if should_skip_event(event, accepted_meta, exact_keys):
                      continue

                  key = canonical_key(event)
                  stamped = stamp_event(event, source["name"])

                  exact_keys.add(key)
                  accepted_meta.append(
                      {
                          "summary": key[2],
                          "range": event_date_range(event),
                      }
                  )
                  all_events.append(stamped)

          if not all_events:
              fail("没有合并到任何 VEVENT，拒绝写入空日历。")

          all_events.sort(key=event_sort_key)

          now = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")

          output_lines: list[str] = [
              "BEGIN:VCALENDAR",
              "VERSION:2.0",
              f"PRODID:{PROD_ID}",
              "CALSCALE:GREGORIAN",
              "METHOD:PUBLISH",
              f"X-WR-CALNAME:{CAL_NAME}",
              "X-WR-TIMEZONE:Asia/Shanghai",
              "X-WR-CALDESC:以 iCloud 中国大陆节假日为主，合并节假日调休 Pro 作为补充，自动去重并保留补班/调休信息。",
              "X-PUBLISHED-TTL:PT24H",
              f"X-UPDATED-AT:{now}",
              f"X-SOURCE-LIST:{' / '.join(used_sources)}",
          ]

          for tz in timezone_components:
              output_lines.extend(tz)

          for event in all_events:
              output_lines.extend(event)

          output_lines.append("END:VCALENDAR")

          OUTPUT_FILE.parent.mkdir(parents=True, exist_ok=True)
          OUTPUT_FILE.write_text(write_ical(output_lines), encoding="utf-8")

          log(f"Wrote: {OUTPUT_FILE}")
          log(f"Used sources: {', '.join(used_sources)}")
          log(f"Merged events: {len(all_events)}")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git add Calendar/china-holidays.ics

          if git diff --cached --quiet; then
            echo "No calendar changes."
            exit 0
          fi

          git commit -m "Update merged China holiday calendar"
          git push origin main