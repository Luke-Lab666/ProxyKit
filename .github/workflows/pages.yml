                background: var(--primary);
              }

              .primary-action:hover {
                background: var(--primary-hover);
              }

              .copy-btn {
                appearance: none;
              }

              .empty {
                display: none;
                padding: 36px 22px;
                margin-top: 16px;
                border: 1px dashed var(--line-strong);
                border-radius: var(--radius-card);
                color: var(--muted);
                text-align: center;
                background: rgba(255, 255, 255, .08);
                font-weight: 760;
              }

              .footer {
                margin-top: 34px;
                color: var(--muted-soft);
                text-align: center;
                font-size: 13px;
                font-weight: 650;
              }

              .toast {
                position: fixed;
