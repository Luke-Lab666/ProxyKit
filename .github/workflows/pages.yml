name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - "Calendar/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/update-calendar.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update AGI Rule
      - Update Calendar
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render static page
        run: |
          set -euo pipefail
          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages
          python3 <<'PY'
          import html
          import json
          import subprocess
          from pathlib import Path
          from urllib.parse import quote

          OWNER = "Luke-Lab666"
          REPO = "ProxyKit"
          BRANCH = "main"
          RAW_BASE = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{BRANCH}/"
          GH_BASE = f"https://github.com/{OWNER}/{REPO}/blob/{BRANCH}/"

          CATEGORIES = [
              {"key": "Rule", "title": "规则", "icon": "R", "type": "normal"},
              {"key": "Scripts", "title": "脚本", "icon": "JS", "type": "normal"},
              {"key": "SurgeModule", "title": "模块", "icon": "M", "type": "normal"},
              {"key": "Calendar", "title": "日历", "icon": "C", "type": "calendar"},
          ]

          CALENDAR_FILE = "Calendar/cn-mainland-holidays-2026-cn-full-v2.ics"
          CALENDAR_REPO = GH_BASE + quote(CALENDAR_FILE)
          CALENDAR_RAW = RAW_BASE + quote(CALENDAR_FILE)
          CALENDAR_WEBCAL = CALENDAR_RAW.replace("https://", "webcal://", 1)
          CALENDAR_TITLE = "中国大陆节假日与中国纪念日 2026"
          CALENDAR_DESC = "中国大陆 2026 法定节假日、调休、中国传统节日、二十四节气、中国常用纪念日。"
          CALENDAR_COUNTS = [
              ("放假", 7, "holiday"),
              ("调休上班", 6, "workday"),
              ("传统节日", 22, "traditional"),
              ("节气", 24, "solar"),
              ("纪念日", 28, "memorial"),
          ]

          def quote_path(path: str) -> str:
              return "/".join(quote(part) for part in path.split("/"))

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def short_time(value: str) -> str:
              if not value:
                  return "更新时间未知"
              value = value.replace("T", " ").replace("Z", "")
              if "+" in value:
                  value = value.split("+", 1)[0]
              return "更新：" + value[:16].replace("-", "/")

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          files = []
          grouped = []
          for category in CATEGORIES:
              if category["type"] != "normal":
                  continue
              folder = Path(category["key"])
              items = []
              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue
                      path = item.as_posix()
                      updated = last_commit_time(path)
                      raw = RAW_BASE + quote_path(path)
                      data = {
                          "name": item.name,
                          "path": path,
                          "folder": category["key"],
                          "title": category["title"],
                          "icon": "IP" if item.suffix == ".mmdb" else category["icon"],
                          "updatedAt": updated,
                          "updatedText": short_time(updated),
                          "raw": raw,
                          "github": GH_BASE + quote_path(path),
                          "install": "surge:///install-module?url=" + raw if category["key"] == "SurgeModule" and item.name.endswith(".sgmodule") else "",
                      }
                      files.append(data)
                      items.append(data)
              grouped.append({"title": category["title"], "folder": category["key"], "files": items})

          calendar_updated = last_commit_time(CALENDAR_FILE)
          calendar_updated_text = short_time(calendar_updated)
          calendar_exists = Path(CALENDAR_FILE).exists()
          calendar_size = Path(CALENDAR_FILE).stat().st_size if calendar_exists else 0
          calendar_meta = {
              "title": "日历",
              "folder": "Calendar",
              "files": [{
                  "name": "中国大陆节假日与中国纪念日 2026",
                  "path": CALENDAR_FILE,
                  "folder": "Calendar",
                  "title": "日历",
                  "icon": "C",
                  "updatedAt": calendar_updated,
                  "updatedText": calendar_updated_text,
                  "raw": CALENDAR_RAW,
                  "webcal": CALENDAR_WEBCAL,
                  "github": CALENDAR_REPO,
                  "count": 87,
                  "size": calendar_size,
              }],
          }
          grouped.append(calendar_meta)

          def file_card(file):
              install = f'<a class="action" href="{esc(file["install"])}">安装</a>' if file["install"] else ""
              search = esc((file["name"] + " " + file["path"] + " " + file["title"]).lower())
              return f'''
                <article class="card file-card" data-folder="{esc(file['folder'])}" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon">{esc(file['icon'])}</span>
                    <span class="type-pill">{esc(file['title'])}</span>
                  </div>
                  <h3>{esc(file['name'])}</h3>
                  <p class="path">{esc(file['path'])}</p>
                  <p class="updated">{esc(file['updatedText'])}</p>
                  <div class="actions">
                    <a class="action primary-dark" href="{esc(file['raw'])}">原始链接</a>
                    <a class="action" href="{esc(file['github'])}">仓库页</a>
                    {install}
                    <button class="action copy-btn" type="button" data-copy="{esc(file['raw'])}">复制</button>
                  </div>
                </article>'''

          def calendar_card():
              chips = "".join(f'<span class="cal-chip {cls}">{name} <b>{count}</b></span>' for name, count, cls in CALENDAR_COUNTS)
              search = esc("calendar 日历 中国大陆 节假日 调休 传统节日 节气 纪念日 ios 订阅".lower())
              return f'''
                <article class="card calendar-card" data-folder="Calendar" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon calendar-icon">C</span>
                    <span class="type-pill">日历</span>
                  </div>
                  <h3>{esc(CALENDAR_TITLE)}</h3>
                  <p class="cal-desc">{esc(CALENDAR_DESC)}</p>
                  <div class="cal-chips">{chips}</div>
                  <div class="actions cal-actions">
                    <a class="action primary-blue" href="{esc(CALENDAR_WEBCAL)}">iOS 订阅</a>
                    <a class="action" href="{esc(CALENDAR_RAW)}">Raw .ics</a>
                    <a class="action" href="{esc(CALENDAR_REPO)}">仓库文件</a>
                    <button class="action copy-btn" type="button" data-copy="{esc(CALENDAR_WEBCAL)}">复制订阅</button>
                  </div>
                  <p class="updated cal-meta">事件数：87 · {esc(calendar_updated_text)} · GitHub Actions 自动更新</p>
                </article>'''

          cards_html = "\n".join(file_card(file) for file in files) + "\n" + calendar_card()
          total = len(files)
          categories_json = json.dumps(grouped, ensure_ascii=False, indent=2)

          index_html = f'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
            <title>ProxyKit · 规则 / 脚本 / 模块 / 日历</title>
            <style>
              :root {{
                color-scheme: light;
                --bg: #f6efd9;
                --bg2: #fffaf0;
                --text: #111318;
                --muted: #7b7a70;
                --card: rgba(255, 255, 255, .72);
                --card-solid: #fffdf7;
                --line: rgba(17, 19, 24, .09);
                --line-strong: rgba(17, 19, 24, .14);
                --black: #111318;
                --blue: #1677ff;
                --shadow: 0 18px 42px rgba(48, 41, 20, .10);
              }}
              @media (prefers-color-scheme: dark) {{
                :root {{
                  color-scheme: dark;
                  --bg: #12110d;
                  --bg2: #1b1812;
                  --text: #f6f1e7;
                  --muted: #ada495;
                  --card: rgba(35, 32, 26, .72);
                  --card-solid: #211f19;
                  --line: rgba(255, 255, 255, .10);
                  --line-strong: rgba(255, 255, 255, .16);
                  --black: #f6f1e7;
                  --blue: #5aa2ff;
                  --shadow: 0 18px 44px rgba(0, 0, 0, .30);
                }}
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0;
                min-height: 100vh;
                color: var(--text);
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at 14% 8%, rgba(255, 255, 255, .96), transparent 28%),
                  radial-gradient(circle at 88% 7%, rgba(246, 200, 86, .30), transparent 28%),
                  radial-gradient(circle at 50% 0%, rgba(255, 250, 230, .78), transparent 42%),
                  linear-gradient(180deg, var(--bg2), var(--bg));
              }}
              .wrap {{ width: min(100%, 980px); margin: 0 auto; padding: 34px 22px 48px; }}
              .topbar {{ display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 26px; }}
              .brand {{ display: inline-flex; align-items: center; gap: 12px; padding: 12px 18px 12px 12px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.56); backdrop-filter: blur(18px); box-shadow: 0 12px 30px rgba(0,0,0,.04); }}
              .logo {{ width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; background: var(--black); color: var(--bg2); font-weight: 900; letter-spacing: -.06em; }}
              .brand b {{ font-size: 30px; letter-spacing: -.06em; }}
              .repo-link {{ color: var(--text); text-decoration: none; font-weight: 800; opacity: .72; }}
              .hero {{ border: 1px solid rgba(255,255,255,.72); border-radius: 36px; padding: 48px 24px; margin-bottom: 34px; text-align: center; background: radial-gradient(circle at 50% 42%, rgba(236, 199, 82, .24), transparent 48%), rgba(255,255,255,.42); backdrop-filter: blur(22px); box-shadow: inset 0 0 0 1px rgba(255,255,255,.22); }}
              h1 {{ margin: 0; font-size: clamp(56px, 9vw, 98px); line-height: .92; letter-spacing: -.09em; }}
              .hero-badges {{ display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-top: 30px; }}
              .hero-badge {{ display: inline-flex; align-items: center; gap: 9px; padding: 12px 18px; border-radius: 999px; background: rgba(255,255,255,.70); border: 1px solid var(--line); font-size: 18px; font-weight: 850; }}
              .dot {{ width: 14px; height: 14px; border-radius: 50%; background: #d9a928; box-shadow: 0 0 0 8px rgba(217,169,40,.14); }}
              .section-title {{ font-size: clamp(40px, 7vw, 66px); line-height: .95; letter-spacing: -.08em; margin: 0 0 22px; }}
              .tabs {{ display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 20px; }}
              .tab {{ border: 1px solid var(--line-strong); background: rgba(255,255,255,.62); color: var(--blue); padding: 15px 25px; border-radius: 999px; font-size: 21px; font-weight: 900; box-shadow: 0 5px 18px rgba(0,0,0,.04); }}
              .tab.active {{ background: var(--black); color: var(--bg2); border-color: var(--black); }}
              .search {{ position: relative; margin: 18px 0 26px; }}
              .search input {{ width: 100%; border: 1px solid var(--line); border-radius: 32px; background: rgba(255,255,255,.64); color: var(--text); padding: 22px 24px 22px 56px; font-size: 20px; outline: none; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }}
              .search span {{ position: absolute; left: 24px; top: 50%; transform: translateY(-50%); opacity: .65; font-size: 18px; }}
              .count {{ color: var(--muted); font-size: 22px; font-weight: 850; margin: 0 0 24px; }}
              .grid {{ display: grid; gap: 22px; }}
              .card {{ border: 1px solid var(--line); border-radius: 32px; background: var(--card); backdrop-filter: blur(18px); box-shadow: var(--shadow); padding: 28px; }}
              .card-head {{ display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }}
              .file-icon {{ width: 56px; height: 56px; border-radius: 20px; display: grid; place-items: center; border: 1px solid var(--line-strong); background: rgba(255,255,255,.62); font-weight: 950; font-size: 20px; }}
              .calendar-icon {{ background: linear-gradient(135deg, rgba(22,119,255,.16), rgba(217,169,40,.20)); color: var(--blue); }}
              .type-pill {{ padding: 10px 17px; border-radius: 999px; background: rgba(240, 236, 224, .72); color: var(--muted); font-weight: 900; font-size: 18px; }}
              h3 {{ margin: 0; font-size: clamp(28px, 4.5vw, 42px); line-height: 1.1; letter-spacing: -.05em; }}
              .path, .updated, .cal-desc, .cal-meta {{ color: var(--muted); font-weight: 760; font-size: 20px; line-height: 1.65; }}
              .path {{ margin: 14px 0 6px; }}
              .updated {{ margin: 0 0 22px; }}
              .actions {{ display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }}
              .action {{ appearance: none; border: 1px solid var(--line-strong); background: rgba(255,255,255,.64); color: var(--blue); text-decoration: none; padding: 12px 18px; border-radius: 999px; font-size: 18px; font-weight: 920; cursor: pointer; }}
              .primary-dark {{ background: var(--black); color: var(--bg2); border-color: var(--black); }}
              .primary-blue {{ background: var(--blue); color: #fff; border-color: var(--blue); }}
              .calendar-card {{ padding: clamp(28px, 5vw, 44px); }}
              .calendar-card h3 {{ max-width: 760px; }}
              .cal-desc {{ max-width: 760px; margin: 18px 0 22px; }}
              .cal-chips {{ display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0 28px; }}
              .cal-chip {{ border: 1px solid var(--line-strong); background: rgba(255,255,255,.58); border-radius: 999px; padding: 10px 16px; font-size: 19px; font-weight: 850; }}
              .cal-chip b {{ font-weight: 950; }}
              .holiday {{ color: #d92d20; }} .workday {{ color: #b54708; }} .traditional {{ color: #1570ef; }} .solar {{ color: #027a48; }} .memorial {{ color: #6941c6; }}
              .empty {{ display: none; text-align: center; color: var(--muted); font-weight: 850; padding: 30px; }}
              .toast {{ position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; padding: 12px 18px; border-radius: 999px; background: var(--black); color: var(--bg2); font-weight: 900; transition: .2s ease; }}
              .toast.show {{ opacity: 1; transform: translateX(-50%) translateY(0); }}
              footer {{ margin-top: 36px; color: var(--muted); text-align: center; font-weight: 700; }}
              @media (max-width: 640px) {{
                .wrap {{ padding: 24px 14px 36px; }}
                .brand b {{ font-size: 25px; }}
                .repo-link {{ display: none; }}
                .hero {{ border-radius: 32px; padding: 42px 14px; }}
                .tab {{ font-size: 19px; padding: 14px 22px; }}
                .card {{ border-radius: 28px; padding: 24px; }}
                .action {{ font-size: 17px; }}
              }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <header class="topbar">
                <a class="brand" href="./" aria-label="ProxyKit 首页"><span class="logo">PK</span><b>ProxyKit</b></a>
                <a class="repo-link" href="https://github.com/{OWNER}/{REPO}">查看仓库</a>
              </header>

              <section class="hero">
                <h1>ProxyKit</h1>
                <div class="hero-badges">
                  <span class="hero-badge"><i class="dot"></i>适配：Surge</span>
                  <span class="hero-badge"><i class="dot"></i>更新：部分自动</span>
                </div>
              </section>

              <h2 class="section-title">文件列表</h2>
              <nav class="tabs" aria-label="文件分类">
                <button class="tab active" type="button" data-filter="all">全部</button>
                <button class="tab" type="button" data-filter="Rule">规则</button>
                <button class="tab" type="button" data-filter="Scripts">脚本</button>
                <button class="tab" type="button" data-filter="SurgeModule">模块</button>
                <button class="tab" type="button" data-filter="Calendar">日历</button>
              </nav>

              <label class="search"><span>⌕</span><input id="search" type="search" placeholder="筛选当前列表…" autocomplete="off"></label>
              <p id="count" class="count">共 {total} 项</p>

              <section id="grid" class="grid">{cards_html}
              </section>
              <p id="empty" class="empty">没找到，换个关键词试试。</p>
              <footer>ProxyKit · 代理配置集合 · 适用于 GitHub Pages · 自动索引页面</footer>
            </main>
            <div id="toast" class="toast">已复制</div>
            <script id="files-json" type="application/json">{esc(categories_json)}</script>
            <script>
              const tabs = Array.from(document.querySelectorAll('.tab'));
              const cards = Array.from(document.querySelectorAll('.card'));
              const input = document.querySelector('#search');
              const count = document.querySelector('#count');
              const empty = document.querySelector('#empty');
              const toast = document.querySelector('#toast');
              let active = 'all';

              function visibleForTab(card) {{
                const folder = card.dataset.folder;
                if (active === 'all') return folder !== 'Calendar';
                return folder === active;
              }}

              function refresh() {{
                const q = input.value.trim().toLowerCase();
                let n = 0;
                for (const card of cards) {{
                  const hitTab = visibleForTab(card);
                  const hitSearch = !q || (card.dataset.search || '').includes(q);
                  const show = hitTab && hitSearch;
                  card.style.display = show ? '' : 'none';
                  if (show) n++;
                }}
                const label = active === 'Calendar' ? '个日历' : '项';
                count.textContent = `共 ${{n}} ${{label}}`;
                empty.style.display = n ? 'none' : 'block';
              }}

              tabs.forEach(btn => {{
                btn.addEventListener('click', () => {{
                  active = btn.dataset.filter;
                  tabs.forEach(x => x.classList.toggle('active', x === btn));
                  input.value = '';
                  refresh();
                }});
              }});

              input.addEventListener('input', refresh);

              async function copyText(text) {{
                try {{
                  await navigator.clipboard.writeText(text);
                }} catch (_) {{
                  const ta = document.createElement('textarea');
                  ta.value = text;
                  document.body.appendChild(ta);
                  ta.select();
                  document.execCommand('copy');
                  ta.remove();
                }}
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1300);
              }}

              document.addEventListener('click', event => {{
                const btn = event.target.closest('[data-copy]');
                if (!btn) return;
                copyText(btn.dataset.copy || '');
              }});

              refresh();
            </script>
          </body>
          </html>'''

          out = Path("/tmp/proxykit-pages")
          out.mkdir(parents=True, exist_ok=True)
          out.joinpath("index.html").write_text(index_html, encoding="utf-8")
          out.joinpath("files.json").write_text(json.dumps(grouped, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          out.joinpath(".nojekyll").write_text("", encoding="utf-8")
          print(f"Rendered {total} normal files plus calendar card.")
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail
          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          cp -a /tmp/proxykit-pages/. .
          git add -A
          git commit -m "deploy: render static GitHub Pages" || {
            echo "No changes to deploy"
            exit 0
          }
          git push --force origin gh-pages
