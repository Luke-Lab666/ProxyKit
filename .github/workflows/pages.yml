                background:
                  radial-gradient(circle at 50% 30%, rgba(215, 178, 95, .16), transparent 44%),
                  var(--hero);
                box-shadow:
                  var(--shadow-page),
                  var(--shadow-control);
              }

              .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background:
                  linear-gradient(135deg, rgba(255, 255, 255, .28), transparent 44%, rgba(184, 135, 47, .05));
                opacity: .9;
              }

              .hero > * {
                position: relative;
                z-index: 1;
              }

              h1 {
                margin: 0;
                font-size: clamp(50px, 8vw, 92px);
                line-height: .92;
                font-weight: 950;
                letter-spacing: -.085em;
              }

              .hero-badges {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 28px;
              }

              .hero-badge,
              .tab,
              .type-pill,
              .file-icon,
              .action {
                border: 1px solid var(--control-border);
                background: var(--control);
                color: var(--control-text);
                box-shadow: var(--shadow-control);
              }

              .hero-badge {
                display: inline-flex;
                align-items: center;
                min-height: 34px;
                padding: 7px 13px;
                border-radius: var(--radius-control);
                font-size: 13px;
                font-weight: 850;
              }

              .section-head {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 18px;
                margin-bottom: 16px;
              }

              .section-head h2 {
                margin: 0;
                font-size: clamp(28px, 4.8vw, 46px);
                letter-spacing: -.06em;
                line-height: 1;
              }

              .summary {
                margin: 8px 0 0;
                color: var(--muted);
                font-size: 15px;
                font-weight: 650;
              }

              .controls {
                display: grid;
                grid-template-columns: 1fr minmax(220px, 330px);
                gap: 14px;
                margin-bottom: 20px;
              }

              .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
              }

              .tab {
                cursor: pointer;
                min-height: 42px;
                padding: 9px 16px;
                border-radius: var(--radius-control);
                font-size: 14px;
                font-weight: 850;
              }

              .tab:hover {
                background: var(--control-hover);
              }

              .tab.active {
                color: var(--active-text);
                border-color: transparent;
                background: linear-gradient(135deg, var(--active-start) 0%, var(--active-mid) 52%, var(--active-end) 100%);
              }

              .search-wrap {
                position: relative;
              }

              .search {
                width: 100%;
                min-height: 42px;
                padding: 9px 16px 9px 42px;
                color: var(--text);
                border: 1px solid var(--control-border);
                border-radius: var(--radius-control);
                outline: none;
                background: var(--field);
                box-shadow: var(--shadow-control);
              }

              .search::placeholder {
                color: var(--muted-soft);
              }

              .search-wrap::before {
                content: "⌕";
                position: absolute;
                left: 16px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--muted-soft);
                font-weight: 900;
              }

              .grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 16px;
              }

              .card {
                position: relative;
                overflow: hidden;
                min-height: 244px;
                padding: 20px;
                border: 1px solid var(--line);
                border-radius: var(--radius-card);
                background: var(--card);
                box-shadow:
                  var(--shadow-card),
                  var(--shadow-control);
                transition:
                  transform .18s ease,
                  background .18s ease,
                  border-color .18s ease,
                  box-shadow .18s ease;
              }

              .card::before {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background:
                  radial-gradient(circle at top right, rgba(224, 179, 92, .12), transparent 46%),
                  linear-gradient(135deg, rgba(255, 255, 255, .14), transparent 44%);
                opacity: .9;
              }

              .card > * {
                position: relative;
                z-index: 1;
              }

              .card:hover {
                transform: translateY(-2px);
                background: var(--card-strong);
                border-color: var(--line-strong);
                box-shadow:
                  var(--shadow-card-hover),
                  var(--shadow-control);
              }

              .card-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 18px;
              }

              .file-icon {
                width: 46px;
                height: 46px;
                border-radius: 16px;
                display: grid;
                place-items: center;
                font-size: 14px;
                font-weight: 950;
                letter-spacing: -.05em;
              }

              .type-pill {
                min-height: 30px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 6px 11px;
                border-radius: var(--radius-control);
                font-size: 12px;
                font-weight: 850;
              }

              h3 {
                margin: 0;
                font-size: 20px;
                line-height: 1.24;
