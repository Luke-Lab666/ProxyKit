name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - "Calendar/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/update-calendar.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update AGI Rule
      - Update Calendar
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render static page
        run: |
          set -euo pipefail
          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages
          python3 <<'PY'
          import html
          import json
          import subprocess
          from pathlib import Path
          from urllib.parse import quote

          OWNER = "Luke-Lab666"
          REPO = "ProxyKit"
          BRANCH = "main"
          RAW_BASE = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{BRANCH}/"
          GH_BASE = f"https://github.com/{OWNER}/{REPO}/blob/{BRANCH}/"

          CATEGORIES = [
              {"key": "Rule", "title": "规则", "icon": "R", "type": "normal"},
              {"key": "Scripts", "title": "脚本", "icon": "JS", "type": "normal"},
              {"key": "SurgeModule", "title": "模块", "icon": "M", "type": "normal"},
              {"key": "Calendar", "title": "日历", "icon": "C", "type": "calendar"},
          ]

          CALENDAR_FILE = "Calendar/cn-mainland-holidays-2026-cn-full-v2.ics"
          CALENDAR_REPO = GH_BASE + quote(CALENDAR_FILE)
          CALENDAR_RAW = RAW_BASE + quote(CALENDAR_FILE)
          CALENDAR_WEBCAL = CALENDAR_RAW.replace("https://", "webcal://", 1)
          CALENDAR_TITLE = "中国大陆节假日与中国纪念日 2026"
          CALENDAR_DESC = "中国大陆 2026 法定节假日、调休、中国传统节日、二十四节气、中国常用纪念日。"
          CALENDAR_COUNTS = [
              ("放假", 7, "holiday"),
              ("调休上班", 6, "workday"),
              ("传统节日", 22, "traditional"),
              ("节气", 24, "solar"),
              ("纪念日", 28, "memorial"),
          ]

          def quote_path(path: str) -> str:
              return "/".join(quote(part) for part in path.split("/"))

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def short_time(value: str) -> str:
              if not value:
                  return "更新时间未知"
              value = value.replace("T", " ").replace("Z", "")
              if "+" in value:
                  value = value.split("+", 1)[0]
              return "更新：" + value[:16].replace("-", "/")

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          files = []
          grouped = []

          for category in CATEGORIES:
              if category["type"] != "normal":
                  continue

              folder = Path(category["key"])
              items = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      path = item.as_posix()
                      updated = last_commit_time(path)
                      raw = RAW_BASE + quote_path(path)

                      data = {
                          "name": item.name,
                          "path": path,
                          "folder": category["key"],
                          "title": category["title"],
                          "icon": "IP" if item.suffix == ".mmdb" else category["icon"],
                          "updatedAt": updated,
                          "updatedText": short_time(updated),
                          "raw": raw,
                          "github": GH_BASE + quote_path(path),
                          "install": "surge:///install-module?url=" + raw if category["key"] == "SurgeModule" and item.name.endswith(".sgmodule") else "",
                      }

                      files.append(data)
                      items.append(data)

              grouped.append({
                  "title": category["title"],
                  "folder": category["key"],
                  "files": items,
              })

          calendar_updated = last_commit_time(CALENDAR_FILE)
          calendar_updated_text = short_time(calendar_updated)
          calendar_exists = Path(CALENDAR_FILE).exists()
          calendar_size = Path(CALENDAR_FILE).stat().st_size if calendar_exists else 0

          calendar_meta = {
              "title": "日历",
              "folder": "Calendar",
              "files": [{
                  "name": "中国大陆节假日与中国纪念日 2026",
                  "path": CALENDAR_FILE,
                  "folder": "Calendar",
                  "title": "日历",
                  "icon": "C",
                  "updatedAt": calendar_updated,
                  "updatedText": calendar_updated_text,
                  "raw": CALENDAR_RAW,
                  "webcal": CALENDAR_WEBCAL,
                  "github": CALENDAR_REPO,
                  "count": 87,
                  "size": calendar_size,
              }],
          }

          grouped.append(calendar_meta)

          def file_card(file):
              install = f'<a class="action" href="{esc(file["install"])}">安装</a>' if file["install"] else ""
              search = esc((file["name"] + " " + file["path"] + " " + file["title"]).lower())

              return f'''
                <article class="card file-card" data-folder="{esc(file['folder'])}" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon">{esc(file['icon'])}</span>
                    <span class="type-pill">{esc(file['title'])}</span>
                  </div>
                  <h3>{esc(file['name'])}</h3>
                  <p class="path">{esc(file['path'])}</p>
                  <p class="updated">{esc(file['updatedText'])}</p>
                  <div class="actions">
                    <a class="action primary-dark" href="{esc(file['raw'])}">原始链接</a>
                    <a class="action" href="{esc(file['github'])}">仓库页</a>
                    {install}
                    <button class="action copy-btn" type="button" data-copy="{esc(file['raw'])}">复制</button>
                  </div>
                </article>'''

          def calendar_card():
              chips = "".join(
                  f'<span class="cal-chip {cls}">{name} <b>{count}</b></span>'
                  for name, count, cls in CALENDAR_COUNTS
              )

              search = esc("calendar 日历 中国大陆 节假日 调休 传统节日 节气 纪念日 ios 订阅".lower())

              return f'''
                <article class="card calendar-card" data-folder="Calendar" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon calendar-icon">C</span>
                    <span class="type-pill">日历</span>
                  </div>
                  <h3>{esc(CALENDAR_TITLE)}</h3>
                  <p class="cal-desc">{esc(CALENDAR_DESC)}</p>
                  <div class="cal-chips">{chips}</div>
                  <div class="actions cal-actions">
                    <a class="action primary-blue" href="{esc(CALENDAR_WEBCAL)}">iOS 订阅</a>
                    <a class="action" href="{esc(CALENDAR_RAW)}">Raw .ics</a>
                    <a class="action" href="{esc(CALENDAR_REPO)}">仓库文件</a>
                    <button class="action copy-btn" type="button" data-copy="{esc(CALENDAR_WEBCAL)}">复制订阅</button>
                  </div>
                  <p class="updated cal-meta">事件数：87 · {esc(calendar_updated_text)} · GitHub Actions 自动更新</p>
                </article>'''

          cards_html = "\n".join(file_card(file) for file in files) + "\n" + calendar_card()
          total = len(files)
          categories_json = json.dumps(grouped, ensure_ascii=False, indent=2)

          index_html = f'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
            <meta name="theme-color" content="#f4efe4" media="(prefers-color-scheme: light)">
            <meta name="theme-color" content="#080705" media="(prefers-color-scheme: dark)">
            <title>ProxyKit · 规则 / 脚本 / 模块 / 日历</title>
            <style>
              :root {{
                color-scheme: light dark;

                --bg: #f4efe4;
                --bg2: #fffaf0;
                --surface: rgba(255, 252, 245, .78);
                --surface-strong: rgba(255, 252, 245, .94);
                --surface-soft: rgba(255, 255, 255, .50);

                --text: #17140d;
                --muted: #756d5e;
                --muted-2: #9a907d;

                --line: rgba(38, 31, 18, .09);
                --line-strong: rgba(38, 31, 18, .15);

                --accent: #b8872f;
                --accent-2: #dfbd72;
                --accent-3: #f3dfaa;

                --black: #17140d;
                --blue: #9b6b1f;

                --radius-xl: 30px;
                --radius-lg: 24px;
                --radius-md: 18px;
                --radius-pill: 999px;

                --shadow-soft: 0 18px 46px rgba(58, 46, 22, .10);
                --shadow-card: 0 16px 38px rgba(58, 46, 22, .08);
                --shadow-hover: 0 24px 64px rgba(58, 46, 22, .14);

                --blur: blur(22px);
              }}

              @media (prefers-color-scheme: dark) {{
                :root {{
                  color-scheme: dark;

                  --bg: #080705;
                  --bg2: #14100a;
                  --surface: rgba(24, 19, 11, .72);
                  --surface-strong: rgba(31, 24, 13, .92);
                  --surface-soft: rgba(255, 239, 190, .055);

                  --text: #f7efe0;
                  --muted: #aaa08d;
                  --muted-2: #827764;

                  --line: rgba(232, 201, 122, .12);
                  --line-strong: rgba(232, 201, 122, .22);

                  --accent: #d8b35f;
                  --accent-2: #f0d78b;
                  --accent-3: #fff0bd;

                  --black: #e8c97a;
                  --blue: #e8c97a;

                  --shadow-soft: 0 18px 48px rgba(0, 0, 0, .34);
                  --shadow-card: 0 18px 44px rgba(0, 0, 0, .30);
                  --shadow-hover: 0 28px 74px rgba(0, 0, 0, .42);
                }}
              }}

              * {{
                box-sizing: border-box;
              }}

              html {{
                min-height: 100%;
                background: var(--bg);
                text-rendering: geometricPrecision;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
