name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update AGI Rule
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build static page index
        run: |
          set -euo pipefail
          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages
          cp -a docs/. /tmp/proxykit-pages/

          python3 <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path
          from html import escape

          categories = [
              {
                  "title": "规则",
                  "desc": "分流规则、域名规则、IP 规则。",
                  "icon": "R",
                  "folder": "Rule",
              },
              {
                  "title": "脚本",
                  "desc": "JavaScript 脚本和响应改写。",
                  "icon": "JS",
                  "folder": "Scripts",
              },
              {
                  "title": "模块",
                  "desc": "Surge 模块和相关配置。",
                  "icon": "M",
                  "folder": "SurgeModule",
              },
          ]

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          output = []

          for category in categories:
              folder = Path(category["folder"])
              files = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      path = item.as_posix()
                      files.append({
                          "name": item.name,
                          "path": path,
                          "updatedAt": last_commit_time(path),
                      })

              output.append({
                  "title": category["title"],
                  "desc": category["desc"],
                  "icon": category["icon"],
                  "folder": category["folder"],
                  "files": files,
              })

          index_json = json.dumps(output, ensure_ascii=False, indent=2)
          site = Path("/tmp/proxykit-pages")

          (site / "files.json").write_text(index_json + "\n", encoding="utf-8")
          (site / ".nojekyll").write_text("", encoding="utf-8")

          index_path = site / "index.html"
          html = index_path.read_text(encoding="utf-8")

          payload = escape(index_json, quote=False)

          if 'id="proxykit-index-data"' in html:
              html = re.sub(
                  r'(<script id="proxykit-index-data" type="application/json">)([\s\S]*?)(</script>)',
                  r'\1' + payload + r'\3',
                  html,
                  count=1,
              )
          else:
              html = html.replace(
                  "<script>",
                  f'<script id="proxykit-index-data" type="application/json">{payload}</script>\n\n  <script>',
                  1,
              )

          index_path.write_text(html, encoding="utf-8")

          print(f"Indexed files: {sum(len(category['files']) for category in output)}")
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          cp -a /tmp/proxykit-pages/. .

          git add -A
          git commit -m "deploy: update GitHub Pages" || {
            echo "No changes to deploy"
            exit 0
          }

          git push --force origin gh-pages
