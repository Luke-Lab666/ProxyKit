name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update AGI Rule
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate docs/files.json
        run: |
          mkdir -p docs
          python3 <<'PY'
          import json
          import subprocess
          from pathlib import Path

          categories = [
              {
                  "title": "规则",
                  "desc": "分流规则、域名规则、IP 规则。",
                  "icon": "R",
                  "folder": "Rule",
              },
              {
                  "title": "脚本",
                  "desc": "JavaScript 脚本和响应改写。",
                  "icon": "JS",
                  "folder": "Scripts",
              },
              {
                  "title": "模块",
                  "desc": "Surge 模块和相关配置。",
                  "icon": "M",
                  "folder": "SurgeModule",
              },
          ]

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          output = []

          for category in categories:
              folder = Path(category["folder"])
              files = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      path = item.as_posix()
                      files.append({
                          "name": item.name,
                          "path": path,
                          "updatedAt": last_commit_time(path),
                      })

              output.append({
                  "title": category["title"],
                  "desc": category["desc"],
                  "icon": category["icon"],
                  "folder": category["folder"],
                  "files": files,
              })

          Path("docs/files.json").write_text(
              json.dumps(output, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          touch docs/.nojekyll

      - name: Commit generated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/files.json docs/.nojekyll
          if git diff --cached --quiet; then
            echo "files.json is already up to date"
          else
            git commit -m "chore: update pages file index [skip ci]"
            git push
          fi

      - name: Check Pages files
        run: |
          echo "Generated files:"
          find docs -maxdepth 2 -type f | sort
          test -f docs/index.html
          test -f docs/files.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
