name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

  workflow_run:
    workflows:
      - Update AGI Rule
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render static page
        run: |
          set -euo pipefail

          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages

          python3 <<'PY'
          import html
          import json
          import subprocess
          from pathlib import Path
          from string import Template
          from urllib.parse import quote

          OWNER = "Luke-Lab666"
          REPO = "ProxyKit"
          BRANCH = "main"

          RAW_BASE = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{BRANCH}/"
          GH_BASE = f"https://github.com/{OWNER}/{REPO}/blob/{BRANCH}/"

          CATEGORIES = [
              {
                  "key": "Rule",
                  "title": "规则",
                  "icon": "R",
              },
              {
                  "key": "Scripts",
                  "title": "脚本",
                  "icon": "JS",
              },
              {
                  "key": "SurgeModule",
                  "title": "模块",
                  "icon": "M",
              },
          ]

          SKIP_NAMES = {
              ".DS_Store",
              ".gitkeep",
          }

          def quote_path(path: str) -> str:
              return "/".join(quote(part) for part in path.split("/"))

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          def raw_url(path: str) -> str:
              return RAW_BASE + quote_path(path)

          def github_url(path: str) -> str:
              return GH_BASE + quote_path(path)

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def short_time(value: str) -> str:
              if not value:
                  return "更新时间未知"

              value = value.replace("T", " ").replace("Z", "")

              if "+" in value:
                  value = value.split("+", 1)[0]

              return "更新：" + value[:16].replace("-", "/")

          def file_size_text(path: Path) -> str:
              try:
                  size = path.stat().st_size
              except OSError:
                  return ""

              if size < 1024:
                  return f"{size} B"

              if size < 1024 * 1024:
                  return f"{size / 1024:.1f} KB"

              return f"{size / 1024 / 1024:.1f} MB"

          files = []
          grouped = []

          for category in CATEGORIES:
              folder = Path(category["key"])
              items = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      if item.name in SKIP_NAMES:
                          continue

                      path = item.as_posix()
                      updated = last_commit_time(path)
                      raw = raw_url(path)

                      data = {
                          "name": item.name,
                          "path": path,
                          "folder": category["key"],
                          "title": category["title"],
                          "icon": "IP" if item.suffix == ".mmdb" else category["icon"],
                          "updatedAt": updated,
                          "updatedText": short_time(updated),
                          "sizeText": file_size_text(item),
                          "raw": raw,
                          "github": github_url(path),
                          "install": "surge:///install-module?url=" + raw if category["key"] == "SurgeModule" and item.name.endswith(".sgmodule") else "",
                      }

                      files.append(data)
                      items.append(data)

              grouped.append({
                  "title": category["title"],
                  "folder": category["key"],
                  "files": items,
              })

          def file_card(file: dict) -> str:
              install = f'<a class="action primary-action" href="{esc(file["install"])}">安装</a>' if file["install"] else ""
              search = esc((file["name"] + " " + file["path"] + " " + file["title"]).lower())
              size = f'<span>{esc(file["sizeText"])}</span>' if file["sizeText"] else ""

              return f'''
              <article class="card" data-folder="{esc(file["folder"])}" data-search="{search}">
                <div class="card-head">
                  <span class="file-icon">{esc(file["icon"])}</span>
                  <span class="type-pill">{esc(file["title"])}</span>
                </div>

                <h3>{esc(file["name"])}</h3>
                <p class="path">{esc(file["path"])}</p>

                <p class="updated">
                  <span>{esc(file["updatedText"])}</span>
                  {size}
                </p>

                <div class="actions">
                  <a class="action" href="{esc(file["raw"])}">原始链接</a>
                  <a class="action" href="{esc(file["github"])}">仓库页</a>
                  {install}
                  <button class="action copy-btn" type="button" data-copy="{esc(file["raw"])}">复制</button>
                </div>
              </article>'''

          cards_html = "\n".join(file_card(file) for file in files)
          total = len(files)
          categories_json = esc(json.dumps(grouped, ensure_ascii=False, indent=2))

          index_template = Template(r'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
            <meta name="theme-color" content="#f3ecdf" media="(prefers-color-scheme: light)">
            <meta name="theme-color" content="#090705" media="(prefers-color-scheme: dark)">
            <title>ProxyKit · 规则 / 脚本 / 模块</title>

            <style>
              :root {
                color-scheme: light dark;

                --page: #f3ecdf;
                --page-top: #fff8ec;
                --page-bottom: #eee4d4;

                --text: #12100b;
                --muted: #766f62;
                --muted-soft: #9b927f;

                --hero: #fff9ef;
                --card: #fffaf0;
                --card-strong: #fffdf7;
                --field: #fff8ed;

                --control: #ebe4d8;
                --control-hover: #e4dbc9;
                --control-border: #d6cdbc;
                --control-text: #756545;

                --active-start: #eed690;
                --active-mid: #ca9438;
                --active-end: #86591f;
                --active-text: #120d05;

                --primary: #181207;
                --primary-hover: #241909;
                --primary-text: #fff0bd;

                --line: rgba(37, 30, 17, .10);
                --line-strong: rgba(37, 30, 17, .16);

                --shadow-page: 0 26px 70px rgba(70, 54, 21, .08);
                --shadow-card: 0 16px 42px rgba(70, 54, 21, .075);
                --shadow-card-hover: 0 24px 58px rgba(70, 54, 21, .12);
                --shadow-control: inset 0 1px 0 rgba(255, 255, 255, .34);

                --radius-hero: 34px;
                --radius-card: 28px;
                --radius-control: 999px;
              }

              @media (prefers-color-scheme: dark) {
                :root {
                  color-scheme: dark;

                  --page: #090705;
                  --page-top: #21180c;
                  --page-bottom: #050403;

                  --text: #f7efde;
                  --muted: #a99f8d;
                  --muted-soft: #817665;

                  --hero: #151109;
                  --card: #151109;
                  --card-strong: #1b150c;
                  --field: #100d08;

                  --control: #241b0f;
                  --control-hover: #2d2213;
                  --control-border: #4b3a20;
                  --control-text: #d7bd75;

                  --active-start: #dec47c;
                  --active-mid: #b98735;
                  --active-end: #76501e;
                  --active-text: #100b04;

                  --primary: linear-gradient(135deg, #dec47c 0%, #b98735 52%, #76501e 100%);
                  --primary-hover: linear-gradient(135deg, #e8ce87 0%, #c8943e 52%, #855a22 100%);
                  --primary-text: #100b04;

                  --line: rgba(232, 201, 122, .12);
                  --line-strong: rgba(232, 201, 122, .22);

                  --shadow-page: 0 30px 90px rgba(0, 0, 0, .30);
                  --shadow-card: 0 18px 48px rgba(0, 0, 0, .32);
                  --shadow-card-hover: 0 26px 68px rgba(0, 0, 0, .44);
                  --shadow-control: inset 0 1px 0 rgba(255, 255, 255, .05);
                }
              }

              * {
                box-sizing: border-box;
              }

              html {
                min-height: 100%;
                background: var(--page);
              }

              body {
                margin: 0;
                min-height: 100vh;
                color: var(--text);
                font-family:
                  ui-sans-serif,
                  system-ui,
                  -apple-system,
                  BlinkMacSystemFont,
                  "SF Pro Text",
                  "PingFang SC",
                  "Microsoft YaHei",
                  sans-serif;
                background:
                  radial-gradient(circle at 20% -10%, rgba(218, 173, 82, .24), transparent 32rem),
                  radial-gradient(circle at 80% 0%, rgba(128, 84, 24, .12), transparent 28rem),
                  linear-gradient(180deg, var(--page-top) 0%, var(--page) 46%, var(--page-bottom) 100%);
              }

              @media (prefers-color-scheme: dark) {
                body {
                  background:
                    radial-gradient(circle at 20% -10%, rgba(205, 157, 64, .16), transparent 32rem),
                    radial-gradient(circle at 80% 0%, rgba(118, 80, 30, .16), transparent 28rem),
                    linear-gradient(180deg, var(--page-top) 0%, var(--page) 46%, var(--page-bottom) 100%);
                }
              }

              a,
              button,
              input {
                -webkit-tap-highlight-color: transparent;
              }

              button,
              input {
                font: inherit;
              }

              .wrap {
                width: min(100%, 1080px);
                margin: 0 auto;
                padding: 34px 22px max(92px, calc(58px + env(safe-area-inset-bottom)));
              }

              .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 28px;
              }

              .brand {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                padding: 9px 16px 9px 9px;
                border: 1px solid var(--line);
                border-radius: var(--radius-control);
                background: var(--card);
                color: var(--text);
                text-decoration: none;
                box-shadow:
                  var(--shadow-card),
                  var(--shadow-control);
              }

              .brand:visited {
                color: var(--text);
              }

              .logo {
                width: 40px;
                height: 40px;
                border-radius: 14px;
                display: grid;
                place-items: center;
                background: var(--primary);
                color: var(--primary-text);
                font-size: 14px;
                font-weight: 950;
                letter-spacing: -.055em;
                box-shadow:
                  0 12px 26px rgba(32, 24, 12, .18),
                  var(--shadow-control);
              }

              .brand b {
                font-size: 22px;
                line-height: 1;
                font-weight: 950;
                letter-spacing: -.055em;
              }

              .repo-link {
                color: var(--muted);
