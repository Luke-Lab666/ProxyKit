              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
              }

              .action {
                min-height: 36px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 7px 12px;
                border-radius: var(--radius-control);
                color: var(--control-text);
                text-decoration: none;
                font-size: 13px;
                font-weight: 850;
                cursor: pointer;
              }

              .action:hover {
                background: var(--control-hover);
              }

              .primary-action {
                color: var(--primary-text);
