name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

  workflow_run:
    workflows:
      - Update AGI Rule
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render static page
        run: |
          set -euo pipefail

          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages

          python3 <<'PY'
          import html
          import json
          import subprocess
          from pathlib import Path
          from urllib.parse import quote

          OWNER = "Luke-Lab666"
          REPO = "ProxyKit"
          BRANCH = "main"

          RAW_BASE = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{BRANCH}/"
          GH_BASE = f"https://github.com/{OWNER}/{REPO}/blob/{BRANCH}/"

          CATEGORIES = [
              {
                  "key": "Rule",
                  "title": "规则",
                  "icon": "R",
                  "desc": "代理规则、GeoIP、分流列表",
              },
              {
                  "key": "Scripts",
                  "title": "脚本",
                  "icon": "JS",
                  "desc": "可用于 Surge / 其他客户端的脚本文件",
              },
              {
                  "key": "SurgeModule",
                  "title": "模块",
                  "icon": "M",
                  "desc": "Surge 模块，一键安装更方便",
              },
          ]

          SKIP_NAMES = {
              ".DS_Store",
              ".gitkeep",
          }

          def quote_path(path: str) -> str:
              return "/".join(quote(part) for part in path.split("/"))

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def short_time(value: str) -> str:
              if not value:
                  return "更新时间未知"

              value = value.replace("T", " ").replace("Z", "")

              if "+" in value:
                  value = value.split("+", 1)[0]

              return "更新：" + value[:16].replace("-", "/")

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          def file_size_text(path: Path) -> str:
              try:
                  size = path.stat().st_size
              except OSError:
                  return ""

              if size < 1024:
                  return f"{size} B"

              if size < 1024 * 1024:
                  return f"{size / 1024:.1f} KB"

              return f"{size / 1024 / 1024:.1f} MB"

          files = []
          grouped = []

          for category in CATEGORIES:
              folder = Path(category["key"])
              items = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      if item.name in SKIP_NAMES:
                          continue

                      path = item.as_posix()
                      updated = last_commit_time(path)
                      raw = RAW_BASE + quote_path(path)
                      github = GH_BASE + quote_path(path)

                      icon = category["icon"]

                      if item.suffix == ".mmdb":
                          icon = "IP"

                      install = ""

                      if category["key"] == "SurgeModule" and item.name.endswith(".sgmodule"):
                          install = "surge:///install-module?url=" + raw

                      data = {
                          "name": item.name,
                          "path": path,
                          "folder": category["key"],
                          "title": category["title"],
                          "icon": icon,
                          "desc": category["desc"],
                          "updatedAt": updated,
                          "updatedText": short_time(updated),
                          "sizeText": file_size_text(item),
                          "raw": raw,
                          "github": github,
                          "install": install,
                      }

                      files.append(data)
                      items.append(data)

              grouped.append(
                  {
                      "title": category["title"],
                      "folder": category["key"],
                      "icon": category["icon"],
                      "desc": category["desc"],
                      "files": items,
                  }
              )

          def file_card(file: dict) -> str:
              install_link = ""

              if file["install"]:
                  install_link = f'<a class="btn primary" href="{esc(file["install"])}">安装</a>'

              search = esc((file["name"] + " " + file["path"] + " " + file["title"]).lower())

              size = ""

              if file["sizeText"]:
                  size = f'<span>{esc(file["sizeText"])}</span>'

              return f'''
              <article class="card" data-category="{esc(file["folder"])}" data-search="{search}">
                <div class="card-top">
                  <div class="badge">{esc(file["icon"])}</div>
                  <div>
                    <div class="card-type">{esc(file["title"])}</div>
                    <h3>{esc(file["name"])}</h3>
                  </div>
                </div>

                <p class="path">{esc(file["path"])}</p>

                <div class="meta">
                  <span>{esc(file["updatedText"])}</span>
                  {size}
                </div>

                <div class="actions">
                  <a class="btn" href="{esc(file["raw"])}">原始链接</a>
                  <a class="btn" href="{esc(file["github"])}">仓库页</a>
                  {install_link}
                  <button class="btn ghost" type="button" data-copy="{esc(file["raw"])}">复制</button>
                </div>
              </article>
              '''

          cards_html = "\n".join(file_card(file) for file in files)
          total = len(files)

          categories_json = json.dumps(grouped, ensure_ascii=False, indent=2)

          index_html = f'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="color-scheme" content="light dark">
            <title>ProxyKit · 规则 / 脚本 / 模块</title>
            <style>
              :root {{
                --bg: #f6f7fb;
                --card: rgba(255, 255, 255, .78);
                --text: #10131a;
                --muted: #667085;
                --border: rgba(16, 19, 26, .10);
                --accent: #4f7cff;
                --accent-2: #00b894;
                --shadow: 0 18px 60px rgba(24, 35, 64, .10);
                --radius: 22px;
              }}

              @media (prefers-color-scheme: dark) {{
                :root {{
                  --bg: #0f1117;
                  --card: rgba(24, 27, 37, .78);
                  --text: #f4f7fb;
                  --muted: #a5adba;
                  --border: rgba(255, 255, 255, .10);
                  --accent: #7aa2ff;
                  --accent-2: #3ee0b7;
                  --shadow: 0 18px 60px rgba(0, 0, 0, .28);
                }}
              }}

              * {{
                box-sizing: border-box;
              }}

              body {{
                margin: 0;
                min-height: 100vh;
                color: var(--text);
                background:
                  radial-gradient(circle at top left, rgba(79, 124, 255, .22), transparent 34rem),
                  radial-gradient(circle at top right, rgba(0, 184, 148, .18), transparent 30rem),
                  var(--bg);
                font-family:
                  ui-sans-serif,
                  system-ui,
                  -apple-system,
                  BlinkMacSystemFont,
                  "SF Pro Text",
                  "PingFang SC",
                  "Microsoft YaHei",
                  sans-serif;
              }}

              a {{
                color: inherit;
                text-decoration: none;
              }}

              .wrap {{
                width: min(1180px, calc(100% - 32px));
                margin: 0 auto;
                padding: 36px 0 44px;
              }}

              .hero {{
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 20px;
                margin-bottom: 24px;
              }}

              .brand {{
                display: inline-flex;
                align-items: center;
                gap: 10px;
                color: var(--muted);
                font-weight: 700;
                letter-spacing: .02em;
              }}

              .logo {{
                width: 36px;
                height: 36px;
                display: grid;
                place-items: center;
                border-radius: 12px;
                color: white;
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
                box-shadow: var(--shadow);
              }}

              h1 {{
                margin: 18px 0 10px;
                font-size: clamp(36px, 7vw, 76px);
                line-height: .9;
                letter-spacing: -.06em;
              }}

              .lead {{
                margin: 0;
                color: var(--muted);
                font-size: 16px;
                line-height: 1.7;
              }}

              .repo {{
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 12px 16px;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--card);
                backdrop-filter: blur(18px);
                box-shadow: var(--shadow);
                color: var(--text);
                font-weight: 700;
                white-space: nowrap;
              }}

              .toolbar {{
                position: sticky;
                top: 0;
                z-index: 10;
                display: grid;
                grid-template-columns: 1fr minmax(220px, 340px);
                gap: 14px;
                padding: 12px 0;
                margin-bottom: 18px;
                backdrop-filter: blur(20px);
              }}

              .tabs {{
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
              }}

              .tab,
              .search {{
                border: 1px solid var(--border);
                background: var(--card);
                color: var(--text);
                border-radius: 999px;
                backdrop-filter: blur(18px);
                box-shadow: 0 10px 28px rgba(24, 35, 64, .06);
              }}

              .tab {{
                cursor: pointer;
                padding: 11px 16px;
                font-weight: 800;
              }}

              .tab.active {{
                color: white;
                border-color: transparent;
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
              }}

              .search {{
                width: 100%;
                padding: 12px 16px;
                outline: none;
                font: inherit;
              }}

              .summary {{
                margin: 0 0 18px;
                color: var(--muted);
              }}

              .grid {{
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 16px;
              }}

              .card {{
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--card);
                backdrop-filter: blur(18px);
                box-shadow: var(--shadow);
                padding: 18px;
                overflow: hidden;
              }}

              .card-top {{
                display: flex;
                align-items: center;
                gap: 12px;
              }}

              .badge {{
                flex: 0 0 auto;
                width: 46px;
                height: 46px;
                display: grid;
                place-items: center;
                border-radius: 16px;
                color: white;
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
                font-weight: 900;
                letter-spacing: -.04em;
              }}

              .card-type {{
                color: var(--muted);
                font-size: 13px;
                font-weight: 800;
              }}

              h3 {{
                margin: 3px 0 0;
                font-size: 17px;
                line-height: 1.35;
                word-break: break-word;
              }}

              .path {{
                margin: 14px 0;
                color: var(--muted);
                font-family:
                  ui-monospace,
                  SFMono-Regular,
                  Menlo,
                  Monaco,
                  Consolas,
                  monospace;
                font-size: 13px;
                line-height: 1.6;
                word-break: break-all;
              }}

              .meta {{
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-bottom: 14px;
                color: var(--muted);
                font-size: 13px;
              }}

              .actions {{
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
              }}

              .btn {{
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 36px;
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: rgba(255, 255, 255, .36);
                color: var(--text);
                font: inherit;
                font-weight: 800;
                cursor: pointer;
              }}

              @media (prefers-color-scheme: dark) {{
                .btn {{
                  background: rgba(255, 255, 255, .06);
                }}
              }}

              .btn.primary {{
                color: white;
                border-color: transparent;
                background: linear-gradient(135deg, var(--accent), var(--accent-2));
              }}

              .btn.ghost {{
                color: var(--muted);
              }}

              .empty {{
                display: none;
                margin: 40px 0;
                padding: 22px;
                border: 1px dashed var(--border);
                border-radius: var(--radius);
                color: var(--muted);
                text-align: center;
              }}

              .footer {{
                margin-top: 34px;
                color: var(--muted);
                text-align: center;
                font-size: 13px;
              }}

              .toast {{
                position: fixed;
                left: 50%;
                bottom: 24px;
                z-index: 99;
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
                pointer-events: none;
                padding: 11px 16px;
                border-radius: 999px;
                background: var(--text);
                color: var(--bg);
                box-shadow: var(--shadow);
                transition: .2s ease;
                font-weight: 800;
              }}

              .toast.show {{
                opacity: 1;
                transform: translateX(-50%) translateY(0);
              }}

              @media (max-width: 900px) {{
                .hero {{
                  align-items: flex-start;
                  flex-direction: column;
                }}

                .toolbar {{
                  grid-template-columns: 1fr;
                }}

                .grid {{
                  grid-template-columns: repeat(2, minmax(0, 1fr));
                }}
              }}

              @media (max-width: 620px) {{
                .wrap {{
                  width: min(100% - 22px, 1180px);
                  padding-top: 22px;
                }}

                .grid {{
                  grid-template-columns: 1fr;
                }}

                .tab {{
                  padding: 10px 13px;
                }}

                .repo {{
                  width: 100%;
                  justify-content: center;
                }}
              }}
            </style>
          </head>
          <body>
            <main class="wrap">
              <section class="hero">
                <div>
                  <div class="brand">
                    <span class="logo">PK</span>
                    <span>ProxyKit</span>
                  </div>

                  <h1>ProxyKit</h1>

                  <p class="lead">规则 / 脚本 / 模块索引页。适配 Surge，部分内容由 GitHub Actions 自动更新。</p>
                </div>

                <a class="repo" href="https://github.com/{OWNER}/{REPO}">查看仓库</a>
              </section>

              <section class="toolbar">
                <div class="tabs">
                  <button class="tab active" type="button" data-filter="all">全部</button>
                  <button class="tab" type="button" data-filter="Rule">规则</button>
                  <button class="tab" type="button" data-filter="Scripts">脚本</button>
                  <button class="tab" type="button" data-filter="SurgeModule">模块</button>
                </div>

                <input class="search" id="search" type="search" placeholder="搜索文件名 / 路径">
              </section>

              <p class="summary">共 <strong id="count">{total}</strong> 项</p>

              <section class="grid" id="grid">
                {cards_html}
              </section>

              <div class="empty" id="empty">没找到，换个关键词试试。</div>

              <footer class="footer">
                ProxyKit · 代理配置集合 · 适用于 GitHub Pages · 自动索引页面
              </footer>
            </main>

            <div class="toast" id="toast">已复制</div>

            <script id="files-data" type="application/json">{html.escape(categories_json)}</script>
            <script>
              const tabs = Array.from(document.querySelectorAll(".tab"));
              const cards = Array.from(document.querySelectorAll(".card"));
              const search = document.querySelector("#search");
              const count = document.querySelector("#count");
              const empty = document.querySelector("#empty");
              const toast = document.querySelector("#toast");

              let currentFilter = "all";

              function applyFilter() {{
                const keyword = search.value.trim().toLowerCase();
                let visible = 0;

                for (const card of cards) {{
                  const category = card.dataset.category;
                  const text = card.dataset.search || "";
                  const categoryMatched = currentFilter === "all" || category === currentFilter;
                  const keywordMatched = !keyword || text.includes(keyword);
                  const show = categoryMatched && keywordMatched;

                  card.style.display = show ? "" : "none";

                  if (show) {{
                    visible += 1;
                  }}
                }}

                count.textContent = visible;
                empty.style.display = visible ? "none" : "block";
              }}

              for (const tab of tabs) {{
                tab.addEventListener("click", () => {{
                  currentFilter = tab.dataset.filter;

                  for (const item of tabs) {{
                    item.classList.toggle("active", item === tab);
                  }}

                  applyFilter();
                }});
              }}

              search.addEventListener("input", applyFilter);

              function showToast() {{
                toast.classList.add("show");

                window.clearTimeout(showToast.timer);

                showToast.timer = window.setTimeout(() => {{
                  toast.classList.remove("show");
                }}, 1400);
              }}

              document.addEventListener("click", async (event) => {{
                const target = event.target.closest("[data-copy]");

                if (!target) {{
                  return;
                }}

                const text = target.dataset.copy;

                try {{
                  await navigator.clipboard.writeText(text);
                  showToast();
                }} catch (error) {{
                  const input = document.createElement("input");
                  input.value = text;
                  document.body.appendChild(input);
                  input.select();
                  document.execCommand("copy");
                  input.remove();
                  showToast();
                }}
              }});

              applyFilter();
            </script>
          </body>
          </html>
          '''

          out = Path("/tmp/proxykit-pages")
          out.mkdir(parents=True, exist_ok=True)

          out.joinpath("index.html").write_text(index_html, encoding="utf-8")
          out.joinpath("files.json").write_text(json.dumps(grouped, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          out.joinpath(".nojekyll").write_text("", encoding="utf-8")

          print(f"Rendered {total} files.")
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true

          cp -a /tmp/proxykit-pages/. .

          git add -A

          git commit -m "deploy: render static GitHub Pages" || {
            echo "No changes to deploy"
            exit 0
          }

          git push --force origin gh-pages