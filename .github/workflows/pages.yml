                }
              }

              @media (max-width: 680px) {
                .wrap {
                  padding-inline: 14px;
                  padding-top: 18px;
                }

                .topbar {
                  align-items: stretch;
                  flex-direction: column;
                  gap: 10px;
                }

                .brand,
                .repo-link {
                  justify-content: center;
                }

                .hero {
                  border-radius: 28px;
                  padding: 38px 18px;
                  margin-bottom: 28px;
                }

                .section-head {
                  align-items: flex-start;
                  flex-direction: column;
                }

                .grid {
                  grid-template-columns: 1fr;
                }

                .card {
                  min-height: 0;
                  border-radius: 24px;
                  padding: 18px;
                }

                .tabs {
                  display: grid;
                  grid-template-columns: repeat(4, minmax(0, 1fr));
                  gap: 8px;
                }

                .tab {
                  padding-inline: 8px;
                  font-size: 13px;
                }
              }
            </style>
          </head>

          <body>
            <main class="wrap">
              <nav class="topbar">
                <a class="brand" href="https://github.com/$OWNER/$REPO">
                  <span class="logo">PK</span>
                  <b>ProxyKit</b>
                </a>
              </nav>

              <section class="hero">
                <h1>ProxyKit</h1>

                <div class="hero-badges">
                  <span class="hero-badge">适配：Surge</span>
                  <span class="hero-badge">更新：部分自动</span>
                </div>
              </section>

              <section class="section-head">
                <div>
                  <h2>文件列表</h2>
                  <p class="summary">共 <strong id="count">$total</strong> 项</p>
                </div>
              </section>

              <section class="controls">
                <div class="tabs">
                  <button class="tab active" type="button" data-filter="all">全部</button>
                  <button class="tab" type="button" data-filter="Rule">规则</button>
                  <button class="tab" type="button" data-filter="Scripts">脚本</button>
                  <button class="tab" type="button" data-filter="SurgeModule">模块</button>
                </div>

                <label class="search-wrap">
                  <input class="search" id="search" type="search" placeholder="搜索文件名 / 路径">
                </label>
              </section>

              <section class="grid" id="grid">
                $cards_html
              </section>

              <div class="empty" id="empty">没找到，换个关键词试试。</div>

              <footer class="footer">
                ProxyKit · 代理配置集合 · 适用于 GitHub Pages · 自动索引页面
              </footer>
            </main>

            <div class="toast" id="toast">已复制</div>

            <script id="files-data" type="application/json">$categories_json</script>
            <script>
              const tabs = Array.from(document.querySelectorAll(".tab"));
              const cards = Array.from(document.querySelectorAll(".card"));
              const search = document.querySelector("#search");
              const count = document.querySelector("#count");
              const empty = document.querySelector("#empty");
              const toast = document.querySelector("#toast");

              let currentFilter = "all";

              function applyFilter() {
                const keyword = search.value.trim().toLowerCase();
                let visible = 0;

                for (const card of cards) {
                  const folder = card.dataset.folder || "";
                  const text = card.dataset.search || "";
                  const folderMatched = currentFilter === "all" || folder === currentFilter;
                  const keywordMatched = !keyword || text.includes(keyword);
                  const show = folderMatched && keywordMatched;

                  card.style.display = show ? "" : "none";

                  if (show) {
                    visible += 1;
                  }
                }

                count.textContent = visible;
                empty.style.display = visible ? "none" : "block";
              }

              for (const tab of tabs) {
                tab.addEventListener("click", () => {
                  currentFilter = tab.dataset.filter;

                  for (const item of tabs) {
                    item.classList.toggle("active", item === tab);
                  }

                  applyFilter();
                });
              }

              search.addEventListener("input", applyFilter);

              function showToast(text) {
                toast.textContent = text || "已复制";
                toast.classList.add("show");

                window.clearTimeout(showToast.timer);

                showToast.timer = window.setTimeout(() => {
                  toast.classList.remove("show");
                }, 1400);
              }

              document.addEventListener("click", async (event) => {
                const target = event.target.closest("[data-copy]");

                if (!target) {
                  return;
                }

                const text = target.dataset.copy;

                try {
                  await navigator.clipboard.writeText(text);
                  showToast("已复制");
                } catch (error) {
                  const input = document.createElement("input");
                  input.value = text;
                  document.body.appendChild(input);
                  input.select();
                  document.execCommand("copy");
                  input.remove();
                  showToast("已复制");
                }
              });

              applyFilter();
            </script>
          </body>
          </html>
          ''')

          index_html = index_template.safe_substitute(
              OWNER=OWNER,
              REPO=REPO,
              total=str(total),
              cards_html=cards_html,
              categories_json=categories_json,
          )

          out = Path("/tmp/proxykit-pages")
          out.mkdir(parents=True, exist_ok=True)

          out.joinpath("index.html").write_text(index_html, encoding="utf-8")
          out.joinpath("files.json").write_text(json.dumps(grouped, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          out.joinpath(".nojekyll").write_text("", encoding="utf-8")

          print(f"Rendered {total} files.")
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true

          cp -a /tmp/proxykit-pages/. .

          git add -A

          git commit -m "deploy: render static GitHub Pages" || {
            echo "No changes to deploy"
            exit 0
          }

          git push --force origin gh-pages