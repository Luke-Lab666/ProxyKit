name: Update Apple Rules

on:
  schedule:
    # 每天 21:20 UTC 运行一次，大约北京时间 05:20
    - cron: "20 21 * * *"

  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-apple-rules
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Apple rules
        run: |
          mkdir -p Rule

          python3 <<'PY'
          import re
          import ipaddress
          import datetime
          from pathlib import Path
          from urllib.request import Request, urlopen
          from urllib.error import URLError, HTTPError

          REPO = "https://github.com/Luke-Lab666/ProxyKit"

          OUTPUTS = {
              "APNs": Path("Rule/APNs"),
              "AppleCN": Path("Rule/AppleCN"),
              "AppleFull": Path("Rule/AppleFull"),
          }

          SOURCES = {
              "AppleCN": [
                  "https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/apple.txt",
                  "https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/icloud.txt",
              ],
              "AppleFull": [
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple.list",
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AppStore/AppStore.list",
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/iCloud/iCloud.list",
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AppleMusic/AppleMusic.list",
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AppleTV/AppleTV.list",
                  "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TestFlight/TestFlight.list",
                  "https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/apple.txt",
                  "https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/icloud.txt",
              ],
          }

          # APNs 端口要求：
          # - 设备连接 APNs：TCP 5223
          # - 激活 / 5223 不可达回退：TCP 443
          # - 服务端/MDM 推送：TCP 443 或 2197
          # - Apple 企业网络服务列表还列出 TCP 80 / 443 / 5223 / 2197
          APNS_HOSTS = [
              "push.apple.com",
          ]

          # 域名规则不限制端口，交给域名本身匹配，避免漏掉 APNs 回退链路。
          APNS_IP_RANGES = [
              ("IP-CIDR", "17.0.0.0/8"),
              ("IP-CIDR6", "2620:149::/32"),
          ]

          # IP 段太宽，只限制 APNs 特征端口。
          # 不写 80 / 443，避免 17.0.0.0/8 + 443 误伤大量 Apple HTTPS 流量。
          APNS_IP_PORTS = [
              5223,
              2197,
          ]

          SEED = {
              "AppleCN": [
                  ("DOMAIN-SUFFIX", "apple.com.cn", ""),
                  ("DOMAIN-SUFFIX", "cdn-apple.com", ""),
                  ("DOMAIN-SUFFIX", "mzstatic.com", ""),
                  ("DOMAIN-SUFFIX", "aaplimg.com", ""),
                  ("DOMAIN", "www.apple.com", ""),
                  ("DOMAIN", "apps.apple.com", ""),
                  ("DOMAIN", "itunes.apple.com", ""),
                  ("DOMAIN", "updates.cdn-apple.com", ""),
                  ("DOMAIN", "swcdn.apple.com", ""),
                  ("DOMAIN", "mesu.apple.com", ""),
                  ("DOMAIN", "ocsp.apple.com", ""),
                  ("DOMAIN", "valid.apple.com", ""),
              ],
              "AppleFull": [
                  ("DOMAIN-SUFFIX", "apple.com", ""),
                  ("DOMAIN-SUFFIX", "apple.com.cn", ""),
                  ("DOMAIN-SUFFIX", "apple-dns.net", ""),
                  ("DOMAIN-SUFFIX", "apple-mapkit.com", ""),
                  ("DOMAIN-SUFFIX", "apple.news", ""),
                  ("DOMAIN-SUFFIX", "appstore.com", ""),
                  ("DOMAIN-SUFFIX", "cdn-apple.com", ""),
                  ("DOMAIN-SUFFIX", "icloud.com", ""),
                  ("DOMAIN-SUFFIX", "icloud.com.cn", ""),
                  ("DOMAIN-SUFFIX", "icloud-content.com", ""),
                  ("DOMAIN-SUFFIX", "me.com", ""),
                  ("DOMAIN-SUFFIX", "mac.com", ""),
                  ("DOMAIN-SUFFIX", "mzstatic.com", ""),
                  ("DOMAIN-SUFFIX", "aaplimg.com", ""),
                  ("DOMAIN-SUFFIX", "push.apple.com", ""),
                  ("DOMAIN", "apps.apple.com", ""),
                  ("DOMAIN", "itunes.apple.com", ""),
                  ("DOMAIN", "music.apple.com", ""),
                  ("DOMAIN", "tv.apple.com", ""),
              ],
          }

          ALLOW_TYPES = {
              "DOMAIN",
              "DOMAIN-SUFFIX",
              "DOMAIN-KEYWORD",
              "IP-CIDR",
              "IP-CIDR6",
          }

          DOMAIN_RE = re.compile(r"^[a-z0-9*][a-z0-9*_.-]*[a-z0-9]$", re.I)
          RULE_RE = re.compile(
              r"\b(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|IP-CIDR|IP-CIDR6),([^,\s#]+)(?:,(no-resolve))?",
              re.I,
          )

          DROP_EXACT = {
              "localhost",
              "local",
          }

          def fetch_text(url):
              try:
                  req = Request(
                      url,
                      headers={
                          "User-Agent": "Luke-Lab666-ProxyKit-Apple-Updater/1.0",
                          "Accept": "text/plain,*/*",
                      },
                  )
                  with urlopen(req, timeout=25) as response:
                      return response.read().decode("utf-8", errors="ignore")
              except (URLError, HTTPError, TimeoutError) as error:
                  print(f"Skip source: {url} ({error})")
                  return ""

          def normalize_value(value):
              value = value.strip().lower()
              value = value.removeprefix(".").rstrip(".")
              return value

          def valid_rule(rule_type, value):
              if not value or value in DROP_EXACT:
                  return False

              if rule_type in {"DOMAIN", "DOMAIN-SUFFIX"}:
                  if "." not in value:
                      return False
                  return bool(DOMAIN_RE.match(value))

              if rule_type == "DOMAIN-KEYWORD":
                  return bool(value) and "," not in value and " " not in value

              if rule_type in {"IP-CIDR", "IP-CIDR6"}:
                  try:
                      ipaddress.ip_network(value, strict=False)
                      return True
                  except ValueError:
                      return False

              return False

          def add_rule(rules, rule_type, value, option=""):
              rule_type = rule_type.strip().upper()
              value = normalize_value(value)
              option = option.strip().lower()

              if rule_type not in ALLOW_TYPES:
                  return

              if option != "no-resolve":
                  option = ""

              if not valid_rule(rule_type, value):
                  return

              rules.add((rule_type, value, option))

          def parse_rules_from_text(text):
              rules = set()

              for match in RULE_RE.finditer(text):
                  rule_type, value, option = match.groups()
                  add_rule(rules, rule_type, value, option or "")

              return rules

          def remove_covered_domains(rules):
              suffixes = {
                  value
                  for rule_type, value, option in rules
                  if rule_type == "DOMAIN-SUFFIX"
              }

              optimized = set()

              for rule_type, value, option in rules:
                  if rule_type == "DOMAIN":
                      covered = any(
                          value == suffix or value.endswith("." + suffix)
                          for suffix in suffixes
                      )
                      if covered:
                          continue

                  optimized.add((rule_type, value, option))

              return optimized

          def sort_key(rule):
              order = {
                  "DOMAIN": 0,
                  "DOMAIN-SUFFIX": 1,
                  "DOMAIN-KEYWORD": 2,
                  "IP-CIDR": 3,
                  "IP-CIDR6": 4,
              }

              rule_type, value, option = rule
              return (order.get(rule_type, 99), value, option)

          def format_rule(rule):
              rule_type, value, option = rule

              if option:
                  return f"{rule_type},{value},{option}"

              return f"{rule_type},{value}"

          def now_utc():
              return datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")

          def write_rule_file(name, rules, desc, sources):
              output = OUTPUTS[name]

              rules = remove_covered_domains(rules)
              sorted_rules = sorted(rules, key=sort_key)

              header = [
                  f"# NAME: {name}",
                  "# AUTHOR: Luke-Lab666",
                  f"# REPO: {REPO}",
                  f"# UPDATED: {now_utc()}",
                  f"# DESC: {desc}",
                  "# FORMAT: Surge Rule Set",
              ]

              if sources:
                  header.append("# SOURCE:")
                  for source in sources:
                      header.append(f"#   - {source}")

              header.append("")

              body = [format_rule(rule) for rule in sorted_rules]

              output.write_text(
                  "\n".join(header + body) + "\n",
                  encoding="utf-8",
              )

              print(f"Generated {output} with {len(body)} rules.")

          def write_apns_file():
              output = OUTPUTS["APNs"]

              header = [
                  "# NAME: APNs",
                  "# AUTHOR: Luke-Lab666",
                  f"# REPO: {REPO}",
                  f"# UPDATED: {now_utc()}",
                  "# DESC: Apple Push Notification service rules with destination port constraints.",
                  "# FORMAT: Surge Rule Set",
                  "# REQUIRED-PORTS: TCP 80, 443, 5223, 2197",
                  "",
              ]

              rules = []

              for host in APNS_HOSTS:
                  rules.append(f"DOMAIN-SUFFIX,{host}")

              for rule_type, value in APNS_IP_RANGES:
                  for port in APNS_IP_PORTS:
                      rules.append(
                          f"AND,(({rule_type},{value},no-resolve),(DEST-PORT,{port}))"
                      )

              output.write_text(
                  "\n".join(header + sorted(rules)) + "\n",
                  encoding="utf-8",
              )

              print(f"Generated {output} with {len(rules)} port-aware rules.")

          def build_from_sources(name):
              rules = set()

              for rule in SEED.get(name, []):
                  add_rule(rules, *rule)

              for source in SOURCES.get(name, []):
                  text = fetch_text(source)
                  rules.update(parse_rules_from_text(text))

              return rules

          write_apns_file()

          apple_cn_rules = build_from_sources("AppleCN")
          apple_full_rules = build_from_sources("AppleFull")

          write_rule_file(
              "AppleCN",
              apple_cn_rules,
              "Apple domains usually available directly in mainland China.",
              SOURCES["AppleCN"],
          )

          write_rule_file(
              "AppleFull",
              apple_full_rules,
              "Full Apple related domain and IP rules for Surge.",
              SOURCES["AppleFull"],
          )
          PY

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Rule/APNs Rule/AppleCN Rule/AppleFull

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          else
            git commit -m "Update Apple rules"
            git pull --rebase
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pages.yml --ref main || echo "Pages workflow dispatch skipped."
