<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProxyKit</title>
  <meta name="description" content="Personal proxy rules, scripts and modules." />
  <style>
    :root {
      --bg: #f8fafc;
      --card: rgba(255, 255, 255, 0.78);
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.28);
      --green: #22c55e;
      --blue: #3b82f6;
      --violet: #8b5cf6;
      --orange: #f97316;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(249, 115, 22, 0.16), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.16), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(139, 92, 246, 0.12), transparent 30%),
        var(--bg);
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    button,
    summary {
      -webkit-tap-highlight-color: transparent;
    }
    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 36px;
    }
    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 56px 28px;
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(249, 115, 22, 0.12), transparent 36%),
        linear-gradient(240deg, rgba(59, 130, 246, 0.12), transparent 36%);
      pointer-events: none;
    }
    .hero > * {
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
      background: rgba(255, 255, 255, 0.62);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.12);
      flex-shrink: 0;
    }
    h1 {
      margin: 22px 0 10px;
      font-size: clamp(42px, 8vw, 84px);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }
    .subtitle {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(16px, 2.8vw, 20px);
      line-height: 1.8;
    }
    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }
    .badge {
      display: inline-flex;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 13px;
      line-height: 1;
    }
    .badge span {
      padding: 9px 12px;
    }
    .badge span:first-child {
      color: #fff;
      background: #111827;
    }
    .badge.green span:last-child {
      color: #fff;
      background: var(--green);
    }
    .badge.blue span:last-child {
      color: #fff;
      background: var(--blue);
    }
    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.06);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }
    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(15, 23, 42, 0.2);
    }
    .button.primary {
      color: #fff;
      border-color: #0f172a;
      background: #0f172a;
    }
    .menu {
      margin-top: 28px;
      display: grid;
      gap: 16px;
    }
    details.category {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.06);
    }
    summary {
      list-style: none;
      cursor: pointer;
    }
    summary::-webkit-details-marker {
      display: none;
    }
    .category-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 26px;
    }
    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .icon.rules {
      background: var(--orange);
    }
    .icon.scripts {
      background: var(--blue);
    }
    .icon.modules {
      background: var(--violet);
    }
    .category-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    .category-desc {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .chevron {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: var(--muted);
      flex-shrink: 0;
    }
    .chevron::before {
      content: "";
      width: 9px;
      height: 9px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: translateY(-2px) rotate(45deg);
      transition: transform 0.2s ease;
    }
    details[open] .chevron::before {
      transform: translateY(2px) rotate(225deg);
    }
    .file-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 26px 26px;
    }
    .file {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }
    .file:hover {
      transform: translateY(-2px);
      border-color: rgba(15, 23, 42, 0.2);
      background: rgba(255, 255, 255, 0.92);
    }
    .file-title {
      display: block;
      font-weight: 780;
      letter-spacing: -0.02em;
      word-break: break-word;
    }
    .file-path {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
    .file-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .mini {
      height: 38px;
      min-width: 82px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
    }
    .mini.raw {
      color: #fff;
      border-color: #0f172a;
      background: #0f172a;
    }
    .empty {
      padding: 0 26px 26px;
      color: var(--muted);
      line-height: 1.8;
    }
    .note {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
    }
    .note h2 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }
    .note p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }
    footer {
      padding: 28px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1080px);
        padding-top: 28px;
      }
      .hero {
        border-radius: 26px;
        padding: 42px 20px;
      }
      .actions {
        flex-direction: column;
      }
      .button {
        width: 100%;
      }
      .category-head {
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        padding: 22px;
      }
      .icon {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        font-size: 20px;
      }
      .category-title {
        font-size: 24px;
      }
      .category-desc {
        font-size: 14px;
      }
      .file-list {
        grid-template-columns: 1fr;
        padding: 0 18px 22px;
      }
      .file {
        grid-template-columns: 1fr;
      }
      .file-actions {
        width: 100%;
      }
      .mini {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">
        <span class="dot"></span>
        随缘维护
      </div>
  <h1>ProxyKit</h1>
  <p class="subtitle">
    本人自用的代理配置集合。<br />
    轻量整理规则、脚本与模块配置，按需维护。
  </p>
  <div class="badges">
    <div class="badge green">
      <span>状态</span>
      <span>随缘维护</span>
    </div>
    <div class="badge blue">
      <span>软件</span>
      <span>Surge</span>
    </div>
  </div>
  <div class="actions">
    <a class="button primary" href="https://github.com/Luke-Lab666/ProxyKit" target="_blank" rel="noopener">
      查看仓库
    </a>
  </div>
</section>
<section class="menu" id="menu"></section>
<section class="note">
  <h2>📝 Note</h2>
  <p>
    本仓库主要用于个人网络环境的配置备份与日常维护。内容会根据实际使用情况调整，不作为通用方案推荐。
  </p>
</section>
<footer>
  ProxyKit · 个人代理配置集合
</footer>
  </main>
  <script>
    const repo = "Luke-Lab666/ProxyKit";
    const branch = "main";
    const menu = document.getElementById("menu");
    const escapeHtml = (value) => {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    };
    const encodePath = (path) => {
      return String(path).split("/").map(encodeURIComponent).join("/");
    };
    const getRawUrl = (path) => {
      return `https://raw.githubusercontent.com/${repo}/${branch}/${encodePath(path)}`;
    };
    const renderFile = (file) => {
      const path = file.path;
      const name = file.name || String(path).split("/").pop();
      const raw = getRawUrl(path);
      return `
        <div class="file">
          <a href="${raw}" target="_blank" rel="noopener">
            <span class="file-title">${escapeHtml(name)}</span>
            <span class="file-path">${escapeHtml(path)}</span>
          </a>
          <div class="file-actions">
            <a class="mini raw" href="${raw}" target="_blank" rel="noopener">Raw</a>
            <button class="mini" type="button" data-copy="${raw}">Copy</button>
          </div>
        </div>
      `;
    };
    const renderMenu = (categories) => {
      if (!Array.isArray(categories) || categories.length === 0) {
        menu.innerHTML = `
          <section class="note">
            <h2>⚠️ 暂无数据</h2>
            <p>没有读取到可显示的文件列表。</p>
          </section>
        `;
        return;
      }
      menu.innerHTML = categories.map((category) => {
        const files = Array.isArray(category.files) ? category.files : [];
        const fileList = files.length
          ? files.map(renderFile).join("")
          : `<div class="empty">这个分类暂时没有可显示的文件。</div>`;
        return `
          <details class="category">
            <summary>
              <div class="category-head">
                <div class="icon ${escapeHtml(category.iconClass || "")}">
                  ${escapeHtml(category.icon || "")}
                </div>
                <div>
                  <h2 class="category-title">${escapeHtml(category.title || "")}</h2>
                  <p class="category-desc">${escapeHtml(category.desc || "")}</p>
                </div>
                <div class="chevron" aria-hidden="true"></div>
              </div>
            </summary>
            <div class="file-list">
              ${fileList}
            </div>
          </details>
        `;
      }).join("");
      bindCopyButtons();
    };
    const bindCopyButtons = () => {
      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", async () => {
          const text = button.getAttribute("data-copy");
          const oldText = button.textContent;
          try {
            await navigator.clipboard.writeText(text);
            button.textContent = "Copied";
          } catch {
            button.textContent = "Failed";
          }
          setTimeout(() => {
            button.textContent = oldText;
          }, 1200);
        });
      });
    };
    const loadFiles = async () => {
      try {
        const response = await fetch(`./files.json?v=${Date.now()}`, {
          cache: "no-store"
        });
        if (!response.ok) {
          throw new Error("Failed to load files.json");
        }
        const data = await response.json();
        renderMenu(data);
      } catch {
        menu.innerHTML = `
          <section class="note">
            <h2>⚠️ 加载失败</h2>
            <p>文件列表读取失败，请确认 docs/files.json 已生成。</p>
          </section>
        `;
      }
    };
    loadFiles();
  </script>
</body>
</html>
