<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1eb" />
  <meta name="description" content="ProxyKit · 规则、脚本、模块统一入口。" />
  <title>ProxyKit · 规则 / 脚本 / 模块</title>
  <style>
    :root{
      --bg:#f4f1eb;
      --paper:#ffffff;
      --ink:#151515;
      --muted:#77746f;
      --line:rgba(21,21,21,.09);
      --line-strong:rgba(21,21,21,.14);
      --soft:#ebe7df;
      --soft-2:#f7f5f0;
      --glass:rgba(255,255,255,.72);
      --shadow:0 34px 90px rgba(22,22,22,.12);
      --shadow-soft:0 18px 42px rgba(22,22,22,.08);
      --radius-xl:34px;
      --radius-lg:24px;
      --radius-md:18px;
      --radius-sm:12px;
      --max:1180px;
      --ease:cubic-bezier(.2,.8,.2,1);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      position:relative;
      margin:0;
      color:var(--ink);
      background:
        linear-gradient(180deg,#f8efdc 0%, #f2e3c0 48%, #edd6a2 100%);
      font:15px/1.55 ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display","SF Pro Text","Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      isolation:isolate;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:-10%;
      pointer-events:none;
      z-index:-1;
      will-change:transform, opacity;
    }

    body::before{
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.82) 0 12%, transparent 34%),
        radial-gradient(circle at 82% 20%, rgba(247,210,125,.38) 0 14%, transparent 36%),
        radial-gradient(circle at 26% 82%, rgba(217,166,54,.18) 0 13%, transparent 32%);
      filter:blur(16px);
      opacity:.95;
      animation:bgFloatOne 16s ease-in-out infinite alternate;
    }

    body::after{
      background:
        radial-gradient(circle at 70% 70%, rgba(255,244,214,.28) 0 12%, transparent 32%),
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(214,165,55,.08));
      filter:blur(14px);
      opacity:.88;
      animation:bgFloatTwo 22s ease-in-out infinite alternate;
    }

    @keyframes bgFloatOne{
      0%{transform:translate3d(-1.2%, -1%, 0) scale(1)}
      50%{transform:translate3d(1.4%, 1.2%, 0) scale(1.05)}
      100%{transform:translate3d(.6%, -1.4%, 0) scale(1.02)}
    }

    @keyframes bgFloatTwo{
      0%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(-1%, .8%, 0) scale(1.03)}
      100%{transform:translate3d(1.1%, -.8%, 0) scale(1.01)}
    }

    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{cursor:pointer}
    ::selection{background:#151515;color:#fff}

    .shell{
      width:min(calc(100% - 32px), var(--max));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      padding:20px 0 10px;
      backdrop-filter:saturate(1.2) blur(18px);
      -webkit-backdrop-filter:saturate(1.2) blur(18px);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      min-height:58px;
      border:1px solid rgba(255,255,255,.62);
      background:rgba(255,255,255,.56);
      box-shadow:0 10px 30px rgba(0,0,0,.045);
      border-radius:999px;
      padding:9px 10px 9px 22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      letter-spacing:-.05em;
      font-size:22px;
    }

    .brand-mark{
      width:34px;height:34px;
      display:grid;place-items:center;
      border-radius:12px;
      color:#fff;
      background:#151515;
      font-size:15px;
      letter-spacing:-.08em;
      box-shadow:0 10px 22px rgba(0,0,0,.16);
    }

    .navlinks{
      display:flex;
      align-items:center;
      gap:10px;
      color:#42413f;
      font-weight:700;
      font-size:13px;
    }

    .navlinks a{
      padding:10px 12px;
      border-radius:999px;
      transition:.24s var(--ease);
    }

    .navlinks a:hover{
      background:rgba(0,0,0,.06);
      transform:translateY(-1px);
    }

    .nav-cta{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      background:#111;
      color:#fff;
      font-weight:850;
      box-shadow:0 12px 28px rgba(0,0,0,.17);
      transition:.24s var(--ease);
    }

    .nav-cta:hover{transform:translateY(-1px);box-shadow:0 16px 34px rgba(0,0,0,.22)}

    .hero{
      position:relative;
      margin-top:18px;
      min-height:220px;
      border-radius:32px;
      overflow:hidden;
      background:
        linear-gradient(135deg, rgba(255,251,240,.94) 0%, rgba(247,233,194,.93) 46%, rgba(239,213,149,.92) 100%);
      box-shadow:0 28px 80px rgba(133,102,38,.14);
      border:1px solid rgba(255,255,255,.72);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(125deg, rgba(255,255,255,.18), transparent 42%, rgba(255,244,214,.10) 72%, transparent 100%);
      pointer-events:none;
      opacity:.96;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:-8%;
      right:-8%;
      bottom:-22%;
      height:64%;
      background:
        radial-gradient(90% 100% at 50% 100%, rgba(255,247,223,.34) 0%, rgba(243,205,111,.14) 40%, transparent 72%),
        radial-gradient(60% 100% at 24% 100%, rgba(255,255,255,.20) 0%, transparent 68%),
        radial-gradient(60% 100% at 78% 100%, rgba(231,184,71,.16) 0%, transparent 66%);
      filter:blur(16px);
      pointer-events:none;
      animation:heroAura 10s ease-in-out infinite alternate;
    }

    @keyframes heroAura{
      0%{transform:translate3d(-1.5%, 0, 0) scale(1)}
      50%{transform:translate3d(0, -2%, 0) scale(1.03)}
      100%{transform:translate3d(1.5%, 0, 0) scale(1.05)}
    }

    .hero-art{
      position:absolute;
      left:50%;
      bottom:-62px;
      width:min(76vw,560px);
      height:132px;
      transform:translateX(-50%);
      border-radius:50%;
      background:
        radial-gradient(65% 100% at 50% 50%, rgba(255,238,190,.50) 0%, rgba(232,185,73,.14) 52%, transparent 78%);
      filter:blur(10px);
      box-shadow:none;
      opacity:.88;
      animation:heroGlow 8.5s ease-in-out infinite alternate;
    }

    .hero-art::after{
      content:"";
      position:absolute;
      inset:16% 8%;
      border-radius:50%;
      background:radial-gradient(60% 100% at 50% 50%, rgba(255,255,255,.18), transparent 70%);
      border:none;
    }

    @keyframes heroGlow{
      0%{transform:translateX(-50%) translateY(0) scale(1)}
      50%{transform:translateX(-50%) translateY(-4px) scale(1.03)}
      100%{transform:translateX(-50%) translateY(0) scale(1.06)}
    }

    .hero-art::after{
      content:"";
      position:absolute;
      inset:28px;
      border:1px solid rgba(0,0,0,.1);
      border-radius:20px;
      background:linear-gradient(120deg, rgba(255,255,255,.24), transparent);
    }

    .hero-inner{
      position:relative;
      z-index:2;
      min-height:220px;
      padding:24px 40px;
      max-width:720px;
      margin:0 auto;
      text-align:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .eyebrow{
      display:flex;
      align-items:center;
      gap:12px;
      color:#6c6963;
      font-weight:800;
      letter-spacing:-.02em;
      margin-bottom:18px;
    }

    .eyebrow::before{
      content:"";
      width:26px;height:2px;
      border-radius:2px;
      background:#99958e;
    }

    h1{
      width:100%;
      margin:0;
      text-align:center;
      font-size:clamp(52px,7.4vw,104px);
      line-height:.9;
      letter-spacing:-.085em;
      font-weight:950;
    }

    .hero-copy{
      width:min(620px,100%);
      margin:28px 0 0;
      color:#5f5b55;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .hero-capsules{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:22px;
    }

    .status-capsule{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:46px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.72);
      background:rgba(255,255,255,.62);
      color:#3f3b35;
      font-weight:900;
      letter-spacing:-.025em;
      overflow:hidden;
      box-shadow:0 18px 42px rgba(0,0,0,.08);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .status-capsule::before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      background:linear-gradient(110deg, transparent 0 26%, rgba(255,255,255,.72) 42%, transparent 58% 100%);
      transform:translateX(-115%);
      animation:capsule-sheen 2.8s var(--ease) infinite;
      pointer-events:none;
    }

    .capsule-dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:linear-gradient(135deg,#f8d982,#c9952f);
      box-shadow:0 0 0 7px rgba(201,149,47,.14), 0 0 22px rgba(201,149,47,.34);
      animation:capsule-pulse 1.8s var(--ease) infinite;
      flex:0 0 auto;
    }

    @keyframes capsule-sheen{
      0%{transform:translateX(-115%)}
      54%,100%{transform:translateX(115%)}
    }

    @keyframes capsule-pulse{
      0%,100%{transform:scale(.82);opacity:.68}
      50%{transform:scale(1);opacity:1}
    }


    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:12px;
      margin-top:34px;
    }

    .btn{
      border:1px solid var(--line-strong);
      background:#fff;
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      font-weight:850;
      transition:.24s var(--ease);
      box-shadow:0 8px 22px rgba(0,0,0,.045);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 34px rgba(0,0,0,.1);
    }

    .btn.primary{
      background:#111;
      color:#fff;
      border-color:#111;
      box-shadow:0 18px 36px rgba(0,0,0,.18);
    }

    .status-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:28px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,.66);
      background:rgba(255,255,255,.46);
      padding:8px 12px;
      border-radius:999px;
      color:#4f4c47;
      font-weight:750;
      font-size:13px;
      backdrop-filter:blur(14px);
    }

    .dot{
      width:8px;height:8px;border-radius:50%;
      background:#2c2c2c;
      box-shadow:0 0 0 5px rgba(44,44,44,.08);
    }

    .search-card{
      position:relative;
      z-index:3;
      width:min(860px,calc(100% - 56px));
      margin:-34px auto 0;
      border-radius:24px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(255,255,255,.74);
      box-shadow:0 28px 80px rgba(0,0,0,.12);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      padding:18px;
    }

    .search-grid{
      display:grid;
      grid-template-columns:1fr 1.1fr auto;
      gap:14px;
      align-items:end;
    }

    .field{
      min-width:0;
      padding:0 18px;
      border-right:1px solid var(--line);
    }

    .field:last-of-type{border-right:0}

    .label{
      display:block;
      margin-bottom:8px;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.055em;
    }

    .input-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:32px;
      color:#8a867e;
    }

    input,select{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:#4a4742;
      min-width:0;
    }

    input::placeholder{color:#a4a09a;text-decoration:underline;text-underline-offset:3px}
    select{appearance:none;-webkit-appearance:none;font-weight:700;color:#65615b}

    .search-submit{
      width:78px;
      height:78px;
      border:0;
      border-radius:24px;
      background:#111;
      color:#fff;
      display:grid;
      place-items:center;
      box-shadow:0 18px 35px rgba(0,0,0,.22);
      transition:.24s var(--ease);
    }

    .search-submit:hover{transform:translateY(-2px) scale(1.02)}

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin:34px auto 0;
      width:min(860px,calc(100% - 56px));
    }

    .stat{
      border:1px solid var(--line);
      background:rgba(255,255,255,.54);
      border-radius:20px;
      padding:20px;
      box-shadow:var(--shadow-soft);
    }

    .stat strong{
      display:block;
      font-size:30px;
      letter-spacing:-.07em;
      line-height:1;
    }

    .stat span{
      display:block;
      margin-top:7px;
      color:#79756f;
      font-weight:750;
      font-size:13px;
    }

    .section{
      padding:18px 0 36px;
    }

    .section-head{
      display:block;
      margin-bottom:18px;
    }

    .section-title{
      margin:0;
      font-size:34px;
      line-height:1;
      letter-spacing:-.07em;
      font-weight:950;
    }

    .section-sub{
      margin:10px 0 0;
      color:#77736d;
      font-weight:650;
    }

    .tool-row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .chip{
      border:1px solid var(--line-strong);
      background:rgba(255,255,255,.64);
      color:#3f3c38;
      border-radius:999px;
      padding:10px 14px;
      font-weight:850;
      transition:.22s var(--ease);
    }

    .chip:hover{transform:translateY(-1px)}
    .chip.active{
      background:#111;
      color:#fff;
      border-color:#111;
      box-shadow:0 14px 30px rgba(0,0,0,.17);
    }

    .mini-search{
      width:min(360px,100%);
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      border-radius:999px;
      padding:12px 16px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .category-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      margin-bottom:28px;
    }

    .category-card{
      border:1px solid var(--line);
      border-radius:24px;
      background:rgba(255,255,255,.72);
      box-shadow:var(--shadow-soft);
      padding:22px;
      min-height:152px;
      cursor:pointer;
      transition:.24s var(--ease);
      position:relative;
      overflow:hidden;
    }

    .category-card::after{
      content:"";
      position:absolute;
      width:160px;height:160px;
      border-radius:50%;
      right:-64px;bottom:-72px;
      background:rgba(0,0,0,.045);
      transition:.24s var(--ease);
    }

    .category-card:hover{
      transform:translateY(-4px);
      box-shadow:0 26px 60px rgba(0,0,0,.1);
      border-color:rgba(0,0,0,.18);
    }

    .category-card.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .category-card.active .cat-desc,
    .category-card.active .cat-count{color:rgba(255,255,255,.7)}

    .cat-icon{
      width:44px;height:44px;
      border:1px solid currentColor;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:950;
      letter-spacing:-.08em;
      margin-bottom:22px;
    }

    .cat-title{
      margin:0;
      font-size:20px;
      font-weight:950;
      letter-spacing:-.055em;
    }

    .cat-desc{
      margin:6px 0 0;
      color:#7d7972;
      font-weight:650;
      font-size:13px;
    }

    .cat-count{
      position:absolute;
      right:18px;
      top:18px;
      color:#9b958c;
      font-weight:900;
      border-radius:999px;
      background:rgba(0,0,0,.045);
      padding:6px 10px;
      font-size:12px;
    }

    .list-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:#77736d;
      font-weight:750;
      margin-bottom:14px;
      min-height:28px;
    }

    .file-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .file-card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.78);
      border-radius:22px;
      padding:18px;
      min-height:186px;
      display:flex;
      flex-direction:column;
      box-shadow:0 14px 36px rgba(0,0,0,.055);
      transition:.22s var(--ease);
      overflow:hidden;
      position:relative;
    }

    .file-card:hover{
      transform:translateY(-3px);
      box-shadow:0 22px 54px rgba(0,0,0,.1);
      border-color:rgba(0,0,0,.16);
    }

    .file-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .file-badge{
      width:42px;height:42px;
      border-radius:15px;
      border:1px solid rgba(0,0,0,.13);
      display:grid;
      place-items:center;
      font-weight:950;
      letter-spacing:-.08em;
      background:#fbfaf7;
      flex:0 0 auto;
    }

    .file-folder{
      color:#9b968e;
      font-size:12px;
      font-weight:900;
      border-radius:999px;
      background:#f3f0ea;
      padding:7px 9px;
      max-width:118px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .file-name{
      margin:18px 0 6px;
      font-size:17px;
      line-height:1.18;
      letter-spacing:-.04em;
      font-weight:950;
      overflow-wrap:anywhere;
    }

    .file-path{
      color:#858079;
      font-size:13px;
      font-weight:650;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow-wrap:anywhere;
    }

    .file-updated{
      margin:10px 0 0;
      color:#8d8881;
      font-size:12px;
      font-weight:800;
      letter-spacing:-.01em;
    }

    .file-actions{
      margin-top:auto;
      padding-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .small-btn{
      border:1px solid var(--line-strong);
      background:#fff;
      border-radius:999px;
      min-height:34px;
      padding:0 11px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      font-weight:900;
      transition:.2s var(--ease);
    }

    .small-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(0,0,0,.24);
    }

    .small-btn.dark{
      background:#111;
      border-color:#111;
      color:#fff;
    }

    .empty{
      display:none;
      border:1px dashed rgba(0,0,0,.18);
      background:rgba(255,255,255,.55);
      border-radius:24px;
      padding:38px;
      text-align:center;
      color:#77736d;
      font-weight:750;
    }

    .empty.show{display:block}

    .skeleton{
      position:relative;
      overflow:hidden;
    }

    .skeleton::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.75), transparent);
      transform:translateX(-100%);
      animation:shine 1.1s infinite;
    }

    @keyframes shine{to{transform:translateX(100%)}}

    .footer{
      margin-top:44px;
      padding:34px 0 42px;
      color:#7b776f;
      border-top:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      font-weight:700;
    }

    .toast{
      position:fixed;
      z-index:90;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      border:1px solid rgba(255,255,255,.18);
      background:#111;
      color:#fff;
      border-radius:999px;
      padding:12px 16px;
      font-weight:850;
      box-shadow:0 18px 44px rgba(0,0,0,.24);
      transition:.24s var(--ease);
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .icon{width:20px;height:20px;display:block;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .muted{color:#827e76}

    @media (max-width:900px){
      .navlinks{display:none}
      .hero{min-height:240px}
      .hero-inner{min-height:240px;padding:22px 18px}
      .hero-art{width:560px;right:-260px;opacity:.6}
      .search-grid{grid-template-columns:1fr}
      .field{border-right:0;border-bottom:1px solid var(--line);padding:8px 4px 14px}
      .field:last-of-type{border-bottom:0}
      .search-submit{width:100%;height:58px;border-radius:18px}
      .stats,.category-grid,.file-grid{grid-template-columns:1fr}
      .section-head,.tool-row,.footer{align-items:flex-start;flex-direction:column}
      .mini-search{width:100%}
    }

    @media (max-width:520px){
      .shell{width:min(calc(100% - 22px), var(--max))}
      .topbar{padding-top:12px}
      .nav{padding-left:14px}
      .brand{font-size:19px}
      .brand-mark{width:32px;height:32px}
      .nav-cta{padding:10px 13px}
      .hero{border-radius:26px;margin-top:10px;min-height:210px}
      .hero-inner{min-height:210px;padding:18px 16px}
      .eyebrow{font-size:13px}
      h1{font-size:56px}
      .hero-copy{font-size:15px}
      .hero-capsules{margin-top:18px;gap:9px;justify-content:center}
      .status-capsule{min-height:40px;padding:0 14px;font-size:14px}
      .hero-actions{gap:9px}
      .btn{min-height:44px;padding:0 14px}
      .search-card,.stats{width:calc(100% - 24px)}
      .search-card{margin-top:-20px;padding:14px;border-radius:20px}
      .stat{padding:16px}
      .section{padding-top:14px}
      .section-title{font-size:30px}
      .file-card{min-height:170px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell nav">
      <a class="brand" href="#top" aria-label="ProxyKit 首页">
        <span class="brand-mark">PK</span>
        <span>ProxyKit</span>
      </a>
      <nav class="navlinks" aria-label="主导航">
        <a href="#rules" data-jump="Rule">规则</a>
        <a href="#scripts" data-jump="Scripts">脚本</a>
        <a href="#modules" data-jump="SurgeModule">模块</a>
        <a href="https://github.com/Luke-Lab666/ProxyKit" target="_blank" rel="noopener">仓库</a>
      </nav>
      <a class="nav-cta" href="https://github.com/Luke-Lab666/ProxyKit" target="_blank" rel="noopener">查看仓库</a>
    </div>
  </header>

  <main id="top">
    <section class="shell hero" aria-labelledby="hero-title">
      <div class="hero-art" aria-hidden="true"></div>
      <div class="hero-inner">
        <h1 id="hero-title">ProxyKit</h1>
        <div class="hero-capsules" aria-label="ProxyKit status">
          <span class="status-capsule"><span class="capsule-dot"></span>适配：Surge</span>
          <span class="status-capsule"><span class="capsule-dot"></span>更新：部分自动</span>
        </div>
      </div>
    </section>


    <section class="shell section" id="live-index">
      <div class="section-head">
        <div>
          <h2 class="section-title">文件列表</h2>
        </div>
      </div>

      <div class="tool-row">
        <div class="chips" id="chips">
          <button class="chip active" data-folder="all">全部</button>
          <button class="chip" data-folder="Rule">规则</button>
          <button class="chip" data-folder="Scripts">脚本</button>
          <button class="chip" data-folder="SurgeModule">模块</button>
        </div>
        <label class="mini-search">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="listSearch" type="search" placeholder="筛选当前列表…" autocomplete="off" />
        </label>
      </div>

      <div class="list-meta">
        <span id="resultMeta">正在读取文件列表…</span>
        
      </div>

      <div class="file-grid" id="fileGrid" aria-live="polite">
        <article class="file-card skeleton"></article>
        <article class="file-card skeleton"></article>
        <article class="file-card skeleton"></article>
        <article class="file-card skeleton"></article>
        <article class="file-card skeleton"></article>
        <article class="file-card skeleton"></article>
      </div>

      <div class="empty" id="emptyState">
        没读取到文件，检查 files.json 是否已生成。
      </div>
    </section>
  </main>

  <footer class="shell footer">
    <span>ProxyKit · 代理配置集合</span>
    <span>适用于 GitHub Pages · 自动索引页面</span>
  </footer>

  <div class="toast" id="toast">已复制</div>

  <script>
    (() => {
      'use strict';

      const REPO_OWNER = 'Luke-Lab666';
      const REPO_NAME = 'ProxyKit';
      const BRANCH = 'main';
      const FOLDERS = [
        { title:'规则', folder:'Rule', icon:'R', desc:'分流规则、域名规则、IP 规则。' },
        { title:'脚本', folder:'Scripts', icon:'JS', desc:'JavaScript 脚本和响应改写。' },
        { title:'模块', folder:'SurgeModule', icon:'M', desc:'Surge 模块和相关配置。' }
      ];

      const RAW_BASE = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/`;
      const GH_BASE = `https://github.com/${REPO_OWNER}/${REPO_NAME}/blob/${BRANCH}/`;
      const INDEX_JSON = './files.json';

      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

      const state = {
        categories: [],
        files: [],
        activeFolder: 'all',
        query: '',
        source: 'loading'
      };

      function safeText(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
          '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
        }[char]));
      }

      function encodePath(path) {
        return String(path).split('/').map(encodeURIComponent).join('/');
      }

      function basename(path) {
        return String(path).split('/').filter(Boolean).pop() || '';
      }

      function extname(name) {
        const clean = String(name).split('?')[0];
        const idx = clean.lastIndexOf('.');
        return idx > -1 ? clean.slice(idx + 1).toLowerCase() : '';
      }

      function folderOf(path, fallback = '') {
        const first = String(path || '').split('/').filter(Boolean)[0] || fallback;
        return FOLDERS.some(item => item.folder === first) ? first : fallback;
      }

      function categoryMeta(folder) {
        return FOLDERS.find(item => item.folder === folder) || { title: folder, folder, icon:'F', desc:'仓库主页 files.' };
      }

      function normalizeFile(item, fallbackFolder = '') {
        const path = typeof item === 'string'
          ? item
          : (item.path || item.url || item.html_url || item.name || '');

        const cleanPath = String(path).replace(/^\/+/, '');
        const folder = folderOf(cleanPath, fallbackFolder);
        const name = typeof item === 'object' && item.name ? item.name : basename(cleanPath);

        if (!cleanPath || !name || !folder) return null;
        if (!FOLDERS.some(entry => entry.folder === folder)) return null;

        return {
          name,
          path: cleanPath,
          folder,
          ext: extname(name),
          updatedAt: typeof item === 'object'
            ? (item.updatedAt || item.updated_at || item.modified || item.lastModified || '')
            : ''
        };
      }

      function groupFiles(files) {
        return FOLDERS.map(meta => ({
          ...meta,
          files: files
            .filter(file => file.folder === meta.folder)
            .sort((a,b) => a.path.localeCompare(b.path, 'zh-Hans-CN', { numeric:true }))
        }));
      }

      function normalizeCategories(data) {
        let files = [];

        if (Array.isArray(data)) {
          const looksCategorized = data.some(item => item && typeof item === 'object' && Array.isArray(item.files));
          if (looksCategorized) {
            data.forEach(category => {
              const fallback = category.folder || folderFromTitle(category.title);
              (category.files || []).forEach(file => {
                const normalized = normalizeFile(file, fallback);
                if (normalized) files.push(normalized);
              });
            });
          } else {
            files = data.map(item => normalizeFile(item)).filter(Boolean);
          }
        } else if (data && typeof data === 'object') {
          Object.entries(data).forEach(([key, value]) => {
            if (Array.isArray(value)) {
              const fallback = folderFromTitle(key) || key;
              value.forEach(file => {
                const normalized = normalizeFile(file, fallback);
                if (normalized) files.push(normalized);
              });
            }
          });
        }

        const seen = new Set();
        files = files.filter(file => {
          if (seen.has(file.path)) return false;
          seen.add(file.path);
          return true;
        });

        return groupFiles(files);
      }

      function folderFromTitle(title) {
        const text = String(title || '').toLowerCase();
        if (text.includes('rule')) return 'Rule';
        if (text.includes('script')) return 'Scripts';
        if (text.includes('module') || text.includes('surge')) return 'SurgeModule';
        return '';
      }

      async function loadFromFilesJson() {
        const response = await fetch(`${INDEX_JSON}?t=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`files.json ${response.status}`);
        return normalizeCategories(await response.json());
      }

      async function loadIndex() {
        try {
          state.categories = await loadFromFilesJson();
          state.source = 'files.json';
        } catch (error) {
          state.categories = groupFiles([]);
          state.source = 'offline';
          console.warn('files.json load failed:', error);
        }

        state.files = state.categories.flatMap(category => category.files);
        renderAll();
      }

      function rawUrl(file) {
        return RAW_BASE + encodePath(file.path);
      }

      function githubUrl(file) {
        return GH_BASE + encodePath(file.path);
      }

      function isSurgeModule(file) {
        return file.folder === 'SurgeModule' && /\.sgmodule$/i.test(file.name);
      }

      function surgeInstallUrl(file) {
        return 'surge:///install-module?url=' + encodeURIComponent(rawUrl(file));
      }

      function fileIcon(file) {
        if (file.folder === 'Rule') return file.ext === 'mmdb' ? 'IP' : 'R';
        if (file.folder === 'Scripts') return 'JS';
        if (file.folder === 'SurgeModule') return 'M';
        return (file.ext || 'F').slice(0,2).toUpperCase();
      }

      function renderAll() {
        renderChips();
        renderFiles();
      }

      function renderChips() {
        $$('#chips .chip').forEach(chip => {
          chip.classList.toggle('active', chip.dataset.folder === state.activeFolder);
        });
      }

      function visibleFiles() {
        const query = state.query.trim().toLowerCase();
        return state.files.filter(file => {
          const matchFolder = state.activeFolder === 'all' || file.folder === state.activeFolder;
          const haystack = `${file.name} ${file.path} ${file.folder} ${file.ext}`.toLowerCase();
          const matchQuery = !query || haystack.includes(query);
          return matchFolder && matchQuery;
        });
      }

      function formatUpdatedText(value) {
        if (!value) return '更新时间未知';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '更新时间未知';
        const pad = num => String(num).padStart(2, '0');
        return `更新：${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function hydrateVisibleDates(files) {
        files.forEach(file => {
          const key = encodeURIComponent(file.path);
          const node = document.querySelector(`[data-updated-path="${key}"]`);
          if (!node) return;
          node.textContent = formatUpdatedText(file.updatedAt);
        });
      }

      function renderFiles() {
        const files = visibleFiles();
        $('#resultMeta').textContent = `共 ${files.length} 项 · ${state.activeFolder === 'all' ? '全部分类' : categoryMeta(state.activeFolder).title}`;

        const grid = $('#fileGrid');
        const empty = $('#emptyState');
        empty.classList.toggle('show', files.length === 0);
        grid.style.display = files.length ? 'grid' : 'none';

        grid.innerHTML = files.map(file => {
          const install = isSurgeModule(file)
            ? `<a class="small-btn" href="${safeText(surgeInstallUrl(file))}">安装</a>`
            : '';

          return `
            <article class="file-card">
              <div class="file-top">
                <span class="file-badge">${safeText(fileIcon(file))}</span>
                <span class="file-folder">${safeText(categoryMeta(file.folder).title)}</span>
              </div>
              <h3 class="file-name">${safeText(file.name)}</h3>
              <p class="file-path">${safeText(file.path)}</p>
              <p class="file-updated" data-updated-path="${safeText(encodeURIComponent(file.path))}">${safeText(formatUpdatedText(file.updatedAt))}</p>
              <div class="file-actions">
                <a class="small-btn dark" href="${safeText(rawUrl(file))}" target="_blank" rel="noopener">原始链接</a>
                <a class="small-btn" href="${safeText(githubUrl(file))}" target="_blank" rel="noopener">仓库</a>
                ${install}
                <button class="small-btn" type="button" data-copy="${safeText(rawUrl(file))}">复制</button>
              </div>
            </article>
          `;
        }).join('');

        hydrateVisibleDates(files);
      }

      function setFilter(folder, query = state.query) {
        state.activeFolder = FOLDERS.some(item => item.folder === folder) || folder === 'all' ? folder : 'all';
        state.query = query;
        $('#listSearch').value = query;
        $('#quickSearch').value = query;
        $('#quickCategory').value = state.activeFolder;
        renderChips();
        renderFiles();
      }

      async function copyText(text) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            const input = document.createElement('textarea');
            input.value = text;
            input.setAttribute('readonly', '');
            input.style.position = 'fixed';
            input.style.opacity = '0';
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            input.remove();
          }
          toast('已复制原始链接');
        } catch {
          toast('复制失败');
        }
      }

      function toast(message) {
        const node = $('#toast');
        node.textContent = message;
        node.classList.add('show');
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => node.classList.remove('show'), 1500);
      }

      function bindEvents() {
        $('#quickSubmit').addEventListener('click', () => {
          setFilter($('#quickCategory').value, $('#quickSearch').value);
          $('#live-index').scrollIntoView({ behavior:'smooth', block:'start' });
        });

        $('#quickSearch').addEventListener('keydown', event => {
          if (event.key === 'Enter') $('#quickSubmit').click();
        });

        $('#listSearch').addEventListener('input', event => {
          state.query = event.target.value;
          $('#quickSearch').value = state.query;
          renderFiles();
        });

        $('#quickCategory').addEventListener('change', event => {
          setFilter(event.target.value, $('#quickSearch').value);
        });

        $('#chips').addEventListener('click', event => {
          const chip = event.target.closest('[data-folder]');
          if (!chip) return;
          setFilter(chip.dataset.folder);
        });

        document.body.addEventListener('click', event => {
          const copyButton = event.target.closest('[data-copy]');
          if (copyButton) copyText(copyButton.dataset.copy);
        });

        $$('[data-jump]').forEach(link => {
          link.addEventListener('click', event => {
            event.preventDefault();
            setFilter(link.dataset.jump);
            $('#live-index').scrollIntoView({ behavior:'smooth', block:'start' });
          });
        });
      }

      bindEvents();
      loadIndex();
    })();
  </script>
</body>
</html>
